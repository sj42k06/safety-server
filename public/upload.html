<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>현장 모니터링 - 스마트 현장 안전관제 시스템</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" />
  <link rel="stylesheet" href="upload.css" />
  <style>
    .monitoring-wrap { display: flex; flex-direction: column; gap: 16px; }
    .camera-section { background: #000; border-radius: 16px; overflow: hidden; position: relative; width: 100%; height: 70vh; }
    .camera-section video { width: 100%; height: 100%; object-fit: cover; }
    .camera-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .camera-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: blink 1s infinite; }
    .camera-dot.danger { background: #ef4444; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .camera-border-danger { border: 4px solid #ef4444 !important; }
    .btn-area { display: flex; gap: 12px; }
    .detect-btn { flex: 1; background: #1e293b; color: #fff; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .detect-btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .detect-btn.stop { background: #dc2626; }
    .status-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .status-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; }
    .status-title { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
    .status-value { font-size: 18px; font-weight: 700; color: #1e293b; }
    .status-value.danger { color: #dc2626; }
    .status-value.safe { color: #16a34a; }
    .analyzing-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: #fff; font-size: 16px; font-weight: 700; }
    .analyzing-spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .alert-popup { position: fixed; top: 20px; right: 20px; background: #dc2626; color: #fff; padding: 16px 20px; border-radius: 12px; z-index: 999; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .alert-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .alert-desc { font-size: 13px; opacity: 0.9; }
    .timer-text { font-size: 13px; color: #94a3b8; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <aside>
    <div class="logo">
      <img src="https://public.readdy.ai/ai/img_res/f3ccc83c-cf23-4ebf-b376-21d351a806b7.png" alt="로고" />
      <div class="logo-text">
        <div class="title">스마트 현장</div>
        <div class="sub">안전관제 시스템</div>
      </div>
    </div>
    <nav>
      <a href="/upload" class="active"><i class="ri-camera-line"></i> 현장 모니터링</a>
      <a href="/reports"><i class="ri-file-chart-line"></i> AI 보고서</a>
    </nav>
    <div class="user-section">
      <div class="user-info">
        <div class="user-avatar"><i class="ri-user-line"></i></div>
        <div>
          <div class="user-name">관리자 (admin)</div>
          <div class="user-role">현장 관리자</div>
        </div>
      </div>
      <button class="logout-btn" onclick="window.location.href='/'">
        <i class="ri-logout-box-r-line"></i> 로그아웃
      </button>
    </div>
  </aside>

  <main>
    <div class="inner">
      <div class="page-tag">
        <i class="ri-camera-line"></i>
        <span>현장 실시간 모니터링</span>
      </div>
      <h2>현장 모니터링</h2>
      <p class="page-desc">
        웹캠을 통해 현장을 실시간으로 모니터링합니다.<br/>
        [감지 시작] 버튼을 클릭하면 3초마다 자동으로 위험 상황을 감지합니다.
      </p>

      <div class="monitoring-wrap">
        <!-- 카메라 화면 -->
        <div class="camera-section" id="cameraSection">
          <video id="cameraVideo" autoplay muted playsinline></video>
          <div class="analyzing-overlay" id="analyzingOverlay">
            <div class="analyzing-spinner"></div>
            <span>AI 분석 중...</span>
          </div>
          <div class="camera-badge">
            <div class="camera-dot" id="cameraDot"></div>
            <span id="cameraStatus">카메라 연결 중...</span>
          </div>
        </div>

        <!-- 상태 카드 -->
        <div class="status-grid">
          <div class="status-card">
            <div class="status-title">현재 상태</div>
            <div class="status-value" id="currentStatus">대기 중</div>
          </div>
          <div class="status-card">
            <div class="status-title">마지막 감지</div>
            <div class="status-value" id="lastDetected">-</div>
          </div>
          <div class="status-card">
            <div class="status-title">분석 횟수</div>
            <div class="status-value" id="analyzeCount">0</div>
          </div>
        </div>

        <div class="timer-text" id="timerText"></div>

        <!-- 버튼 -->
        <div class="btn-area">
          <button class="detect-btn" id="detectBtn" onclick="startDetection()">
            <i class="ri-shield-flash-line"></i> 감지 시작
          </button>
          <button class="detect-btn stop" id="stopBtn" onclick="stopDetection()" style="display:none;">
            <i class="ri-stop-circle-line"></i> 감지 중지
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- 위험 알림 팝업 -->
  <div class="alert-popup" id="alertPopup">
    <div class="alert-title">🔴 위험 감지!</div>
    <div class="alert-desc" id="alertDesc">위험 상황이 감지됐습니다. 보고서를 확인하세요.</div>
  </div>

  <script>
const cameraVideo = document.getElementById('cameraVideo');
const cameraSection = document.getElementById('cameraSection');
const cameraDot = document.getElementById('cameraDot');
const cameraStatus = document.getElementById('cameraStatus');
const detectBtn = document.getElementById('detectBtn');
const stopBtn = document.getElementById('stopBtn');
const analyzingOverlay = document.getElementById('analyzingOverlay');
const alertPopup = document.getElementById('alertPopup');
const timerText = document.getElementById('timerText');

let analyzeCount = 0;
let isAnalyzing = false;
let intervalId = null;
let countdown = 3;
let countdownId = null;

// 카메라 연결
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    cameraVideo.srcObject = stream;
    cameraDot.className = 'camera-dot';
    cameraStatus.textContent = 'LIVE';
    detectBtn.disabled = false;
  } catch (err) {
    cameraStatus.textContent = '카메라 연결 실패';
    cameraDot.style.background = '#ef4444';
  }
}

// 카운트다운 표시
function startCountdown() {
  countdown = 3;
  timerText.textContent = `다음 분석까지 ${countdown}초`;
  countdownId = setInterval(() => {
    countdown--;
    if (countdown > 0) {
      timerText.textContent = `다음 분석까지 ${countdown}초`;
    } else {
      clearInterval(countdownId);
      timerText.textContent = 'AI 분석 중...';
    }
  }, 1000);
}

// 카메라 사진 캡처
function captureFrame() {
  const canvas = document.createElement('canvas');
  canvas.width = cameraVideo.videoWidth;
  canvas.height = cameraVideo.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(cameraVideo, 0, 0);
  return canvas;
}

// 감지 중지
function stopDetection() {
  clearInterval(intervalId);
  clearInterval(countdownId);
  timerText.textContent = '';
  isAnalyzing = false;
  intervalId = null;
  detectBtn.style.display = 'flex';
  detectBtn.disabled = false;
  detectBtn.innerHTML = '<i class="ri-shield-flash-line"></i> 감지 시작';
  stopBtn.style.display = 'none';
  analyzingOverlay.style.display = 'none';
  document.getElementById('currentStatus').textContent = '대기 중';
  document.getElementById('currentStatus').className = 'status-value';
  cameraSection.classList.remove('camera-border-danger');
  cameraDot.classList.remove('danger');
}

// AI 분석
async function analyze() {
  if (isAnalyzing) return;
  isAnalyzing = true;
  analyzingOverlay.style.display = 'flex';
  document.getElementById('currentStatus').textContent = '분석 중...';

  const canvas = captureFrame();

  canvas.toBlob(async (blob) => {
    const formData = new FormData();
    formData.append('video', blob, 'capture.jpg');

    try {
      const res = await fetch('https://safety-server-oqza.onrender.com/analyze', {
        method: 'POST',
        body: formData
      });

      if (!res.ok) throw new 오류('서버 오류');

      const data = await res.json();
      const reportId = data.report_id;
      if (!reportId) throw new 오류('분석 실패');

      analyzeCount++;
      document.getElementById('analyzeCount').textContent = analyzeCount;
      document.getElementById('lastDetected').textContent = new Date().toLocaleTimeString('ko-KR');

      // 위험 감지 시 자동 중지
      clearInterval(intervalId);
      clearInterval(countdownId);
      timerText.textContent = '';
      stopBtn.style.display = 'none';
      detectBtn.style.display = 'flex';

      // 알림 표시
      cameraSection.classList.add('camera-border-danger');
      cameraDot.classList.add('danger');
      alertPopup.style.display = 'block';
      document.getElementById('currentStatus').textContent = '위험 감지!';
      document.getElementById('currentStatus').className = 'status-value danger';

      // 보고서 페이지로 이동
      setTimeout(() => {
        window.location.href = '/reports/' + reportId;
      }, 2000);

    } catch (err) {
      // 정상이거나 오류면 계속 감지
      analyzeCount++;
      document.getElementById('analyzeCount').textContent = analyzeCount;
      document.getElementById('currentStatus').textContent = '감지 중...';
      analyzingOverlay.style.display = 'none';
      isAnalyzing = false;
      startCountdown();
    }
  }, 'image/jpeg');
}

// 감지 시작
function startDetection() {
  detectBtn.style.display = 'none';
  stopBtn.style.display = 'flex';
  document.getElementById('currentStatus').textContent = '감지 중...';

  // 즉시 첫 분석
  analyze();

  // 3초마다 반복
  intervalId = setInterval(() => {
    if (!isAnalyzing) {
      analyze();
    }
  }, 3000);
}

initCamera();
  </script>
</body>
</html>
