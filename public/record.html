<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인수인계 기록</title>
<link href="/first.css" rel="stylesheet" type="text/css">
</head>

<body>
<header>
<h2>인수인계 기록</h2>
</header>

<div class="container">

<div id="list"></div>

<script>
fetch("/records")
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.reverse().forEach(item => {
      html += `
        <div>
          <p>${item.time}</p>
          <img src="${item.image}" width="200"/>
          <p>${item.result}</p>
        </div>
        <hr/>
      `;
    });
    document.getElementById("list").innerHTML = html;
  });
</script>

<button onclick="location.href='/index.html'">등록 페이지</button>

</div>
</body>
</html>
