<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>인수인계 기록</title>
<link href="/first.css" rel="stylesheet">
</head>

<body>

<h2>인수인계 기록</h2>

<button onclick="loadRisks()">조회</button>

<table id="riskTable" border="1" style="display:none;">
<thead>
<tr>
<th>시간</th>
<th>파일</th>
<th>결과</th>
</tr>
</thead>

<tbody id="riskBody"></tbody>
</table>

<script>
const tbody = document.getElementById("riskBody");

async function loadRisks() {
  const res = await fetch('/records');
  const risks = await res.json();

  tbody.innerHTML = risks.map(item => `
    <tr>
      <td>${item.time}</td>
      <td>
        ${item.type === "video"
          ? `<video src="${item.file}" width="200" controls></video>`
          : `<img src="${item.file}" width="200">`}
      </td>
      <td>${item.result}</td>
    </tr>
  `).join('');

  document.getElementById('riskTable').style.display = 'table';
}
</script>

<br>
<button onclick="location.href='/index.html'">등록 페이지</button>

</body>
</html>
