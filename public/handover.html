<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인수인계 현황 | 안전관리 시스템</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .container { width: 100%; max-width: 520px; animation: fadeUp .4s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

    .card { background: #fff; border-radius: 24px; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,.4); }

    .hw-header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 28px 28px 22px; color: #fff; }
    .hw-header-top { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
    .hw-icon { width:48px; height:48px; border-radius:14px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.15); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
    .hw-title    { font-size:20px; font-weight:800; margin-bottom:2px; }
    .hw-subtitle { font-size:13px; color:#94a3b8; }
    .hw-user-row { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:10px 14px; }
    .hw-user-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; flex-shrink:0; animation:pulse 2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .hw-user-name { font-size:13px; font-weight:600; }
    .hw-user-time { font-size:12px; color:#94a3b8; margin-left:auto; }

    .hw-body { padding: 24px 28px; }
    .hw-stats { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:24px; }
    .hw-stat { border-radius:14px; padding:18px 16px; display:flex; flex-direction:column; gap:6px; }
    .hw-stat.danger { background:#fef2f2; border:1px solid #fecaca; }
    .hw-stat.safe   { background:#f0fdf4; border:1px solid #bbf7d0; }
    .hw-stat.info   { background:#eff6ff; border:1px solid #bfdbfe; }
    .st-label { font-size:11px; font-weight:700; color:#64748b; letter-spacing:.3px; }
    .st-num   { font-size:36px; font-weight:800; line-height:1; }
    .hw-stat.danger .st-num { color:#dc2626; }
    .hw-stat.safe   .st-num { color:#16a34a; }
    .hw-stat.info   .st-num { color:#2563eb; }
    .st-sub { font-size:11px; color:#94a3b8; }

    .section-title { font-size:12px; font-weight:700; color:#475569; margin-bottom:10px; display:flex; align-items:center; gap:6px; text-transform:uppercase; letter-spacing:.5px; }
    .report-list { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }
    .report-item { background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:10px; }
    .report-item .r-id { font-size:11px; font-weight:800; color:#dc2626; background:#fee2e2; border-radius:6px; padding:3px 8px; flex-shrink:0; }
    .report-item .r-case { font-size:11px; font-weight:700; color:#64748b; flex-shrink:0; }
    .report-item .r-desc { font-size:12px; color:#334155; flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .report-item .r-time { font-size:11px; color:#94a3b8; flex-shrink:0; }
    .list-empty { text-align:center; padding:20px; color:#94a3b8; font-size:13px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:12px; }

    .hw-divider { height:1px; background:#f1f5f9; margin-bottom:20px; }

    .btn-approve { width:100%; padding:16px; border:none; border-radius:14px; background:linear-gradient(135deg,#16a34a 0%,#15803d 100%); color:#fff; font-size:16px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; font-family:inherit; transition:all .2s; margin-bottom:0; box-shadow:0 4px 16px rgba(22,163,74,.35); }
    .btn-approve:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(22,163,74,.45); }
    .btn-approve:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }

    .hw-loading { text-align:center; padding:40px; color:#94a3b8; font-size:13px; }
    .loading-icon { font-size:32px; animation:spin .8s linear infinite; display:block; margin-bottom:12px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .hw-done { display:none; flex-direction:column; align-items:center; gap:14px; padding:40px 28px; text-align:center; }
    .hw-done.show { display:flex; }
    .done-circle { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,#16a34a,#15803d); display:flex; align-items:center; justify-content:center; font-size:38px; box-shadow:0 8px 24px rgba(22,163,74,.4); animation:popIn .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
    .done-title { font-size:22px; font-weight:800; color:#16a34a; }
    .done-sub   { font-size:13px; color:#64748b; }
    .done-time  { font-size:12px; color:#94a3b8; }
    .btn-goto { margin-top:4px; padding:14px 36px; border:none; border-radius:14px; background:#1e293b; color:#fff; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; }
    .btn-goto:hover { background:#0f172a; transform:translateY(-1px); }
    .countdown { font-size:12px; color:#94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="hw-header">
        <div class="hw-header-top">
          <div class="hw-icon">📋</div>
          <div>
            <div class="hw-title">인수인계 현황</div>
            <div class="hw-subtitle">교대 전 현황 확인 및 인수 승인</div>
          </div>
        </div>
        <div class="hw-user-row">
          <div class="hw-user-dot"></div>
          <span class="hw-user-name" id="hwUserName">관리자</span>
          <span class="hw-user-time" id="hwUserTime"></span>
        </div>
      </div>

      <div class="hw-loading" id="hwLoading">
        <i class="ri-loader-4-line loading-icon"></i>
        현황 불러오는 중...
      </div>

      <div class="hw-body" id="hwBody" style="display:none;">
        <div class="hw-stats">
          <div class="hw-stat danger" id="unresolvedStat">
            <div class="st-label">⚠️ 미조치 보고서</div>
            <div class="st-num" id="hwUnresolved">0</div>
            <div class="st-sub">즉시 확인 필요</div>
          </div>
          <div class="hw-stat info">
            <div class="st-label">📄 당일 보고서</div>
            <div class="st-num" id="hwToday">0</div>
            <div class="st-sub">오늘 생성된 보고서</div>
          </div>
        </div>

        <div class="section-title"><i class="ri-alert-line"></i> 미조치 보고서 목록</div>
        <div class="report-list" id="hwReportList"></div>
        <div class="hw-divider"></div>

        <button class="btn-approve" id="btnApprove" onclick="approve()">
          ✅ 인수 승인
        </button>
      </div>

      <div class="hw-done" id="hwDone">
        <div class="done-circle">✅</div>
        <div class="done-title">인수 승인 완료</div>
        <div class="done-sub" id="doneSub"></div>
        <div class="done-time" id="doneTime"></div>
        <button class="btn-goto" onclick="goDashboard()">대시보드로 이동 →</button>
        <div class="countdown" id="countdown"></div>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL   = 'https://safety-server-oqza.onrender.com';
    const username   = localStorage.getItem('username') || 'admin';
    const displayName = username === 'admin2' ? '정재학 (admin2)' : '손광민 (admin)';
    let countdownTimer = null;

    if (!localStorage.getItem('username')) window.location.href = '/';

    document.getElementById('hwUserName').textContent = displayName;
    document.getElementById('hwUserTime').textContent = new Date().toLocaleString('ko-KR', { hour:'2-digit', minute:'2-digit' });

    window.onload = async () => {
      try {
        const res  = await fetch(BASE_URL + '/api/handover/summary');
        const data = await res.json();

        const unresolvedCount = data.unresolved_count || 0;
        const todayCount      = data.today_count      || 0;

        document.getElementById('hwUnresolved').textContent = unresolvedCount;
        document.getElementById('hwToday').textContent      = todayCount;

        // 미조치 0건이면 바로 대시보드
        if (unresolvedCount === 0) {
          goDashboard();
          return;
        }

        // 미조치 카드 색상
        const stat = document.getElementById('unresolvedStat');
        stat.className = unresolvedCount === 0 ? 'hw-stat safe' : 'hw-stat danger';

        const list   = data.unresolved_reports || [];
        const listEl = document.getElementById('hwReportList');
        if (list.length === 0) {
          listEl.innerHTML = '<div class="list-empty">✅ 미조치 보고서가 없습니다!</div>';
        } else {
          listEl.innerHTML = list.map(r => `
            <div class="report-item">
              <span class="r-id">#${r.report_id}</span>
              <span class="r-case">${r.case_name || '-'}</span>
              <span class="r-desc">${r.report_title || '안전 위반 감지'}</span>
              <span class="r-time">${formatDate(r.created_at)}</span>
            </div>
          `).join('');
        }
      } catch (_) {
        document.getElementById('hwUnresolved').textContent = '-';
        document.getElementById('hwToday').textContent      = '-';
        document.getElementById('hwReportList').innerHTML   = '<div class="list-empty" style="background:#fff0f0;border-color:#fecaca;">데이터를 불러오지 못했습니다.</div>';
      }

      document.getElementById('hwLoading').style.display = 'none';
      document.getElementById('hwBody').style.display    = 'block';
    };

    async function approve() {
      const btn = document.getElementById('btnApprove');
      btn.disabled = true;
      btn.innerHTML = '<i class="ri-loader-4-line" style="animation:spin .7s linear infinite;display:inline-block;"></i> 처리 중...';

      try {
        await fetch(BASE_URL + '/api/handover/approve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user: username, approved_at: new Date().toISOString() })
        });
      } catch (_) {}

      document.getElementById('hwBody').style.display = 'none';
      const done = document.getElementById('hwDone');
      done.classList.add('show');
      document.getElementById('doneSub').textContent  = `${displayName}이(가) 인수를 승인했습니다.`;
      document.getElementById('doneTime').textContent = new Date().toLocaleString('ko-KR');

      let sec = 3;
      document.getElementById('countdown').textContent = `${sec}초 후 자동 이동...`;
      countdownTimer = setInterval(() => {
        sec--;
        if (sec <= 0) { clearInterval(countdownTimer); goDashboard(); }
        else document.getElementById('countdown').textContent = `${sec}초 후 자동 이동...`;
      }, 1000);
    }

    function goDashboard() {
      if (countdownTimer) clearInterval(countdownTimer);
      window.location.href = '/dashboard';
    }

    function formatDate(str) {
      if (!str) return '-';
      const d = new Date(str);
      return (d.getMonth()+1) + '/' + d.getDate() + ' '
        + d.getHours().toString().padStart(2,'0') + ':'
        + d.getMinutes().toString().padStart(2,'0');
    }
  </script>
</body>
</html>
