<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인수인계 - 스마트 현장 안전관제 시스템</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" />
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; }

    .container { width:100%; max-width:560px; }
    .card { background:#fff; border-radius:24px; overflow:hidden; box-shadow:0 32px 80px rgba(0,0,0,.4); }

    /* 헤더 */
    .hw-header { background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%); padding:28px; color:#fff; }
    .hw-header-top { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
    .hw-icon { width:48px; height:48px; border-radius:14px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.15); display:flex; align-items:center; justify-content:center; font-size:24px; }
    .hw-title { font-size:20px; font-weight:800; margin-bottom:2px; }
    .hw-subtitle { font-size:13px; color:#94a3b8; }
    .hw-user-row { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:10px 14px; }
    .hw-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .hw-user-name { font-size:13px; font-weight:600; }
    .hw-user-time { font-size:12px; color:#94a3b8; margin-left:auto; }

    /* 바디 */
    .hw-body { padding:24px 28px; }

    /* 요약 카드 */
    .hw-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    .hw-stat { border-radius:14px; padding:16px; }
    .hw-stat.danger { background:#fef2f2; border:1px solid #fecaca; }
    .hw-stat.safe   { background:#f0fdf4; border:1px solid #bbf7d0; }
    .hw-stat.info   { background:#eff6ff; border:1px solid #bfdbfe; }
    .hw-stat.warn   { background:#fefce8; border:1px solid #fde047; }
    .st-label { font-size:11px; font-weight:700; color:#64748b; margin-bottom:4px; }
    .st-num   { font-size:32px; font-weight:800; line-height:1; margin-bottom:4px; }
    .hw-stat.danger .st-num { color:#dc2626; }
    .hw-stat.safe   .st-num { color:#16a34a; }
    .hw-stat.info   .st-num { color:#2563eb; }
    .hw-stat.warn   .st-num { color:#d97706; }
    .st-sub { font-size:11px; color:#94a3b8; }

    /* 섹션 타이틀 */
    .sec-title { font-size:12px; font-weight:700; color:#475569; margin-bottom:10px; display:flex; align-items:center; gap:6px; letter-spacing:.3px; }

    /* 미조치 목록 */
    .unresolved-list { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; max-height:220px; overflow-y:auto; }
    .u-item { background:#fef2f2; border:1px solid #fecaca; border-radius:10px; padding:10px 14px; display:flex; align-items:center; gap:10px; }
    .u-badge { font-size:10px; font-weight:800; color:#dc2626; background:#fee2e2; border-radius:6px; padding:2px 8px; flex-shrink:0; white-space:nowrap; }
    .u-case { font-size:11px; font-weight:700; color:#64748b; flex-shrink:0; max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .u-time { font-size:11px; color:#94a3b8; margin-left:auto; flex-shrink:0; }
    .u-empty { text-align:center; padding:16px; color:#16a34a; font-size:13px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:10px; margin-bottom:20px; }

    /* 보고서 생성 버튼 */
    .btn-generate { width:100%; padding:14px; border:1.5px solid #2563eb; border-radius:12px; background:#eff6ff; color:#2563eb; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; font-family:inherit; transition:all .2s; margin-bottom:12px; }
    .btn-generate:hover { background:#dbeafe; }
    .btn-generate:disabled { opacity:.5; cursor:not-allowed; }

    /* 승인 버튼 */
    .btn-approve { width:100%; padding:16px; border:none; border-radius:14px; background:linear-gradient(135deg,#16a34a 0%,#15803d 100%); color:#fff; font-size:16px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; font-family:inherit; transition:all .2s; box-shadow:0 4px 16px rgba(22,163,74,.35); }
    .btn-approve:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(22,163,74,.45); }
    .btn-approve:disabled { opacity:.5; cursor:not-allowed; transform:none; }

    /* 완료 화면 */
    .hw-done { display:none; flex-direction:column; align-items:center; gap:14px; padding:40px 28px; text-align:center; }
    .hw-done.show { display:flex; }
    .done-circle { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,#16a34a,#15803d); display:flex; align-items:center; justify-content:center; font-size:38px; box-shadow:0 8px 24px rgba(22,163,74,.4); animation:popIn .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
    .done-title { font-size:22px; font-weight:800; color:#16a34a; }
    .done-sub   { font-size:13px; color:#64748b; }
    .btn-goto { padding:14px 36px; border:none; border-radius:14px; background:#1e293b; color:#fff; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; }
    .btn-goto:hover { background:#0f172a; }

    .loading { text-align:center; padding:40px; color:#94a3b8; font-size:13px; }
    .divider { height:1px; background:#f1f5f9; margin:16px 0; }

    .report-created { background:#eff6ff; border:1px solid #bfdbfe; border-radius:10px; padding:12px 14px; margin-bottom:12px; display:none; align-items:center; gap:10px; font-size:13px; color:#2563eb; }
    .report-created.show { display:flex; }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="hw-header">
      <div class="hw-header-top">
        <div class="hw-icon">📋</div>
        <div>
          <div class="hw-title">인수인계 현황</div>
          <div class="hw-subtitle">근무 종료 전 미조치 내역을 확인하세요</div>
        </div>
      </div>
      <div class="hw-user-row">
        <div class="hw-dot"></div>
        <span class="hw-user-name" id="hwUserName">로딩 중...</span>
        <span class="hw-user-time" id="hwUserTime"></span>
      </div>
    </div>

    <div class="hw-body">
      <div id="hwLoading" class="loading">데이터 불러오는 중...</div>
      <div id="hwContent" style="display:none;">

        <!-- 요약 카드 -->
        <div class="hw-stats">
          <div class="hw-stat danger">
            <div class="st-label">미조치 건수</div>
            <div class="st-num" id="unresolvedCount">0</div>
            <div class="st-sub">즉시 확인 필요</div>
          </div>
          <div class="hw-stat safe">
            <div class="st-label">조치완료 건수</div>
            <div class="st-num" id="resolvedCount">0</div>
            <div class="st-sub">처리 완료</div>
          </div>
          <div class="hw-stat info">
            <div class="st-label">총 위험 감지</div>
            <div class="st-num" id="totalCount">0</div>
            <div class="st-sub">이번 근무 중</div>
          </div>
          <div class="hw-stat warn">
            <div class="st-label">평균 위험도</div>
            <div class="st-num" id="avgRisk">0%</div>
            <div class="st-sub">이번 근무 중</div>
          </div>
        </div>

        <!-- 미조치 목록 -->
        <div class="sec-title"><i class="ri-alert-line"></i> 미조치 내역</div>
        <div id="unresolvedList"></div>

        <div class="divider"></div>

        <!-- 보고서 생성 -->
        <div class="report-created" id="reportCreated">
          <i class="ri-file-check-line" style="font-size:18px;"></i>
          <span>보고서가 생성되었습니다. <strong id="reportLink" style="cursor:pointer;text-decoration:underline;">보고서 확인</strong></span>
        </div>

        <button class="btn-generate" id="btnGenerate" onclick="generateReport()">
          <i class="ri-file-add-line"></i> 보고서 생성
        </button>

        <!-- 인수 승인 -->
        <button class="btn-approve" id="btnApprove" onclick="approveHandover()">
          <i class="ri-check-double-line"></i> 인수인계 승인
        </button>
      </div>

      <!-- 완료 화면 -->
      <div class="hw-done" id="hwDone">
        <div class="done-circle">✅</div>
        <div class="done-title">인수인계 완료!</div>
        <div class="done-sub" id="doneMsg">인수인계가 완료되었습니다.</div>
        <button class="btn-goto" onclick="window.location.href='/upload'">현장 모니터링으로 이동</button>
      </div>
    </div>
  </div>
</div>

<script>
  const BASE_URL = '';
  const user = localStorage.getItem('username') || 'admin';
  const userName = user === 'admin2' ? '정재학' : user === 'admin3' ? '관리자 C' : user === 'admin4' ? '관리자 D' : '손광민';
  let currentSessionId = null;
  let generatedReportId = null;

  document.getElementById('hwUserName').textContent = `${userName} (${user})`;
  document.getElementById('hwUserTime').textContent = new Date().toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});

  async function loadHandover() {
    try {
      // 현재 세션 조회
      const sesRes = await fetch(`${BASE_URL}/api/session/current`);
      const sesData = await sesRes.json();
      const session = sesData.session;
      if (!session) throw new Error('세션 없음');
      currentSessionId = session.session_id;

      // 미조치 위험 이벤트 조회
      const evRes = await fetch(`${BASE_URL}/api/session/${currentSessionId}/events`);
      const evData = await evRes.json();
      const events = evData.events || [];

      const unresolved = events.filter(e => e.action_status === '미조치');
      const resolved   = events.filter(e => e.action_status === '조치완료');
      const total = events.length;
      const avgRisk = total > 0 ? (events.reduce((s,e) => s + parseFloat(e.risk_percent||0), 0) / total).toFixed(1) : 0;

      document.getElementById('unresolvedCount').textContent = unresolved.length;
      document.getElementById('resolvedCount').textContent   = resolved.length;
      document.getElementById('totalCount').textContent      = total;
      document.getElementById('avgRisk').textContent         = avgRisk + '%';

      // 미조치 목록 렌더링
      const list = document.getElementById('unresolvedList');
      if (unresolved.length === 0) {
        list.innerHTML = '<div class="u-empty"><i class="ri-checkbox-circle-line" style="font-size:18px;vertical-align:-3px;margin-right:6px;"></i>미조치 내역이 없습니다</div>';
      } else {
        list.innerHTML = `<div class="unresolved-list">${unresolved.map(e => {
          const t = e.detected_time ? new Date(e.detected_time).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) : '-';
          const grade = parseFloat(e.risk_percent||0) >= 60 ? '즉각조치' : parseFloat(e.risk_percent||0) >= 31 ? '위험' : '주의';
          return `<div class="u-item">
            <span class="u-badge">${grade}</span>
            <span class="u-case">${e.risk_case || '-'}</span>
            <span class="u-time">${t}</span>
          </div>`;
        }).join('')}</div>`;
      }

      document.getElementById('hwLoading').style.display = 'none';
      document.getElementById('hwContent').style.display = 'block';

    } catch(e) {
      document.getElementById('hwLoading').innerHTML = '<div style="color:#dc2626;font-size:13px;">데이터를 불러올 수 없습니다.<br>현장 모니터링에서 감지를 시작해주세요.</div>';
    }
  }

  async function generateReport() {
    const btn = document.getElementById('btnGenerate');
    btn.disabled = true;
    btn.innerHTML = '<i class="ri-loader-4-line"></i> 생성 중...';

    try {
      const res = await fetch(`${BASE_URL}/api/reports/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: currentSessionId, created_by: 1 })
      });
      const data = await res.json();
      if (data.success) {
        generatedReportId = data.report_id;
        const created = document.getElementById('reportCreated');
        created.classList.add('show');
        document.getElementById('reportLink').onclick = () => window.location.href = `/reports/${generatedReportId}`;
        btn.innerHTML = '<i class="ri-check-line"></i> 보고서 생성 완료';
      } else {
        btn.disabled = false;
        btn.innerHTML = '<i class="ri-file-add-line"></i> 보고서 생성';
        alert('보고서 생성 실패: ' + (data.error || '오류'));
      }
    } catch(e) {
      btn.disabled = false;
      btn.innerHTML = '<i class="ri-file-add-line"></i> 보고서 생성';
    }
  }

  async function approveHandover() {
    const btn = document.getElementById('btnApprove');
    btn.disabled = true;
    btn.innerHTML = '<i class="ri-loader-4-line"></i> 처리 중...';

    try {
      // 인수인계 승인 처리
      if (generatedReportId) {
        await fetch(`${BASE_URL}/api/handover/approve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            handover_id: generatedReportId,
            from_user: userName,
            to_user: '다음 관리자'
          })
        });
      }

      // 완료 화면
      document.getElementById('hwContent').style.display = 'none';
      document.getElementById('hwDone').classList.add('show');
      document.getElementById('doneMsg').textContent = `${userName} 관리자님의 인수인계가 완료되었습니다.`;

      // 3초 후 현장 모니터링으로 이동
      setTimeout(() => window.location.href = '/upload', 3000);

    } catch(e) {
      btn.disabled = false;
      btn.innerHTML = '<i class="ri-check-double-line"></i> 인수인계 승인';
    }
  }

  loadHandover();
</script>
</body>
</html>
