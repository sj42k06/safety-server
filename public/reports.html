<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 보고서 - 스마트 현장 안전관제 시스템</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" />
  <link rel="stylesheet" href="reports.css" />
</head>
<body>
  <aside>
    <div class="logo">
      <img src="https://public.readdy.ai/ai/img_res/f3ccc83c-cf23-4ebf-b376-21d351a806b7.png" alt="로고" />
      <div class="logo-text">
        <div class="title">스마트 현장</div>
        <div class="sub">안전관제 시스템</div>
      </div>
    </div>
    <nav>
      <a href="/upload"><i class="ri-upload-cloud-2-line"></i> 영상 분석</a>
      <a href="/reports" class="active"><i class="ri-file-chart-line"></i> AI 보고서</a>
    </nav>
    <div class="user-section">
      <div class="user-info">
        <div class="user-avatar"><i class="ri-user-line"></i></div>
        <div>
          <div class="user-name">관리자 (admin)</div>
          <div class="user-role">현장 관리자</div>
        </div>
      </div>
      <button class="logout-btn" onclick="window.location.href='/'">
        <i class="ri-logout-box-r-line"></i> 로그아웃
      </button>
    </div>
  </aside>
  <main>
    <div class="page-header">
      <div>
        <div class="page-tag">
          <i class="ri-file-chart-line"></i>
          <span>AI 분석 보고서</span>
        </div>
        <h2>보고서 목록</h2>
        <p class="page-desc">업로드된 영상의 AI 안전 분석 결과 · 총 <span id="totalCount">0</span>건</p>
      </div>
      <div class="header-btns">
        <button class="btn-reset" id="resetBtn" style="display:none" onclick="showResetModal()">
          <i class="ri-refresh-line"></i> 전체 초기화
        </button>
        <a href="/upload" class="btn-new">
          <i class="ri-add-line"></i> 새 영상 분석
        </a>
      </div>
    </div>
    <div id="emptyState" class="empty-state">
      <div class="empty-icon"><i class="ri-file-chart-line"></i></div>
      <div class="empty-title">아직 분석된 보고서가 없습니다</div>
      <p class="empty-desc">현장 영상을 업로드하면 AI가 자동으로 위험 요소를 분석하고 보고서를 생성합니다</p>
      <a href="/upload" class="empty-btn">
        <i class="ri-upload-cloud-2-line"></i> 첫 번째 영상 업로드하기
      </a>
    </div>
    <div id="reportsGrid" class="reports-grid" style="display:none"></div>
  </main>
  <!-- 개별 삭제 모달 -->
  <div class="modal-bg" id="deleteModal" style="display:none">
    <div class="modal">
      <div class="modal-icon red"><i class="ri-delete-bin-line"></i></div>
      <h3>보고서를 삭제할까요?</h3>
      <p>삭제된 보고서는 복구할 수 없습니다.</p>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeDeleteModal()">취소</button>
        <button class="btn-confirm-red" onclick="confirmDelete()">삭제</button>
      </div>
    </div>
  </div>
  <!-- 전체 초기화 모달 -->
  <div class="modal-bg" id="resetModal" style="display:none">
    <div class="modal">
      <div class="modal-icon amber"><i class="ri-refresh-line"></i></div>
      <h3>전체 초기화할까요?</h3>
      <p>모든 보고서가 삭제되고 처음 상태로 돌아갑니다. 이 작업은 되돌릴 수 없습니다.</p>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeResetModal()">취소</button>
        <button class="btn-confirm-amber" onclick="confirmReset()">초기화</button>
      </div>
    </div>
  </div>
<script>
  const BASE_URL = 'https://safety-server-oqza.onrender.com';
  const reportsGrid = document.getElementById('reportsGrid');
  const emptyState  = document.getElementById('emptyState');
  const totalCount  = document.getElementById('totalCount');
  const resetBtn    = document.getElementById('resetBtn');
  let pendingDeleteId = null;
  function formatDate(str) {
    if (!str) return '-';
    return new Date(str).toLocaleString('ko-KR');
  }
  async function loadReports() {
    try {
      const res = await fetch(BASE_URL + '/api/reports');
      if (!res.ok) throw new Error('서버 오류 ' + res.status);
      const data = await res.json();
      const reports = data.reports || [];
      totalCount.textContent = reports.length;
      if (reports.length === 0) {
        emptyState.style.display = 'flex';
        reportsGrid.style.display = 'none';
        resetBtn.style.display = 'none';
        return;
      }
      emptyState.style.display = 'none';
      reportsGrid.style.display = 'grid';
      resetBtn.style.display = 'inline-flex';
      reportsGrid.innerHTML = reports.map(r => {
  // 위험 건수 계산 (서버가 danger_count 또는 items 배열 제공 시)
  const dangerCount = r.danger_count || 0;
  const workerCount = r.worker_count || 0;
  const lawRef = r.law_reference || '';
  const riskLevel = dangerCount > 3 ? 'high' : dangerCount > 0 ? 'mid' : 'low';
  const riskLabel = riskLevel === 'high' ? '고위험' : riskLevel === 'mid' ? '주의' : '정상';
  const riskColor = riskLevel === 'high' ? '#dc2626' : riskLevel === 'mid' ? '#d97706' : '#16a34a';
  const riskBg = riskLevel === 'high' ? '#fee2e2' : riskLevel === 'mid' ? '#fef3c7' : '#dcfce7';
  return '<div class="report-card" onclick="goDetail(' + r.report_id + ')">'
    + '<div class="card-top">'
    + '<span class="card-id">보고서 #' + r.report_id + '</span>'
    + '<span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:' + riskBg + ';color:' + riskColor + '">' + riskLabel + '</span>'
    + '<button class="card-delete" onclick="event.stopPropagation();showDeleteModal(' + r.report_id + ')">'
    + '<i class="ri-delete-bin-line"></i></button>'
    + '</div>'
    // 스냅샷 이미지 (있을 경우)
    + (r.thumbnail ? '<div style="width:100%;height:140px;overflow:hidden;border-radius:8px;margin-bottom:12px;"><img src="' + r.thumbnail + '" style="width:100%;height:100%;object-fit:cover;object-position:top" alt="스냅샷"/></div>' : '')
    + '<p class="card-summary">' + (r.summary || '요약 없음') + '</p>'
    // 작업자 ID / 위반 내역
    + (workerCount > 0 ? '<div style="font-size:12px;color:#475569;margin:8px 0 4px;"><i class="ri-user-follow-line"></i> 추적 작업자 <strong>' + workerCount + '명</strong> · 위험 감지 <strong style="color:' + riskColor + '">' + dangerCount + '건</strong></div>' : '')
    // 법규 조항
    + (lawRef ? '<div style="font-size:11px;color:#64748b;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:6px 10px;margin-top:6px;"><i class="ri-scales-3-line"></i> ' + lawRef + '</div>' : '')
    + '<div class="card-footer">'
    + '<span><i class="ri-time-line"></i> ' + formatDate(r.created_at) + '</span>'
    + '<span class="card-link">상세 보기 →</span>'
    + '</div>'
    + '</div>';
}).join('');
    } catch (err) {
      emptyState.style.display = 'flex';
      reportsGrid.style.display = 'none';
      document.querySelector('.empty-title').textContent = '보고서를 불러오지 못했습니다';
      document.querySelector('.empty-desc').textContent = err.message;
    }
  }
  function goDetail(reportId) {
    window.location.href = '/reports/' + reportId;
  }
  function showDeleteModal(id) {
    pendingDeleteId = id;
    document.getElementById('deleteModal').style.display = 'flex';
  }
  function closeDeleteModal() {
    pendingDeleteId = null;
    document.getElementById('deleteModal').style.display = 'none';
  }
  async function confirmDelete() {
    if (!pendingDeleteId) return;
    try {
      await fetch(BASE_URL + '/api/reports/' + pendingDeleteId, { method: 'DELETE' });
    } catch(e) {}
    closeDeleteModal();
    loadReports();
  }
  function showResetModal() {
    document.getElementById('resetModal').style.display = 'flex';
  }
  function closeResetModal() {
    document.getElementById('resetModal').style.display = 'none';
  }
  async function confirmReset() {
    try {
      await fetch(BASE_URL + '/api/reports', { method: 'DELETE' });
    } catch(e) {}
    closeResetModal();
    loadReports();
  }
  loadReports();
</script>
</body>
</html>
