<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>통계실 - 스마트 현장 안전관제 시스템</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" />
  <link rel="stylesheet" href="upload.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    .nav-group-title { display:flex; align-items:center; gap:10px; padding:10px 16px; border-radius:8px; color:#94a3b8; font-size:14px; font-weight:500; cursor:pointer; transition:all .2s; user-select:none; }
    .nav-group-title:hover { background:rgba(255,255,255,.05); color:#fff; }
    .nav-group-title.open { color:#fff; }
    .nav-arrow { margin-left:auto; transition:transform .2s; font-size:16px; }
    .nav-arrow.open { transform:rotate(180deg); }
    .nav-sub { display:none; flex-direction:column; gap:2px; padding-left:14px; margin-top:2px; }
    .nav-sub.open { display:flex; }
    .nav-sub a { display:flex; align-items:center; gap:8px; padding:8px 14px; border-radius:8px; color:#94a3b8; font-size:13px; text-decoration:none; transition:all .2s; }
    .nav-sub a:hover { background:rgba(255,255,255,.05); color:#fff; }
    .nav-sub a.active { background:rgba(59,130,246,.15); color:#60a5fa; font-weight:600; }

    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }
    .stat-card { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:18px; }
    .stat-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .stat-label { font-size:12px; color:#94a3b8; font-weight:500; }
    .stat-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; }
    .stat-icon.red    { background:#fee2e2; color:#dc2626; }
    .stat-icon.yellow { background:#fef3c7; color:#d97706; }
    .stat-icon.blue   { background:#dbeafe; color:#2563eb; }
    .stat-icon.green  { background:#dcfce7; color:#16a34a; }
    .stat-value { font-size:28px; font-weight:800; color:#1e293b; margin-bottom:2px; }
    .stat-desc  { font-size:11px; color:#94a3b8; }

    .filter-section { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:18px; margin-bottom:18px; }
    .filter-section-title { font-size:13px; font-weight:700; color:#1e293b; margin-bottom:14px; display:flex; align-items:center; gap:6px; }
    .filter-rows { display:flex; flex-direction:column; gap:12px; }
    .filter-row  { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .filter-label { font-size:12px; color:#64748b; font-weight:600; width:60px; flex-shrink:0; }
    .period-btn { padding:7px 14px; border:1px solid #e2e8f0; border-radius:8px; background:#f8fafc; color:#64748b; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .2s; }
    .period-btn.active { background:#1e293b; color:#fff; border-color:#1e293b; }
    .filter-select { padding:7px 12px; border:1px solid #e2e8f0; border-radius:8px; font-size:12px; font-family:inherit; color:#1e293b; background:#f8fafc; outline:none; cursor:pointer; }
    .period-input { padding:7px 12px; border:1px solid #e2e8f0; border-radius:8px; font-size:12px; font-family:inherit; outline:none; background:#f8fafc; }
    .type-btn { padding:6px 12px; border:1px solid #e2e8f0; border-radius:20px; background:#f8fafc; color:#64748b; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .2s; }
    .type-btn.active { color:#fff; border-color:transparent; }
    .type-btn[data-type="보호구미착용"].active  { background:#dc2626; }
    .type-btn[data-type="중장비접근"].active    { background:#f97316; }
    .type-btn[data-type="낙하물"].active        { background:#f59e0b; }
    .type-btn[data-type="위험구역출입"].active  { background:#8b5cf6; }
    .type-btn[data-type="자재걸림"].active      { background:#ec4899; }
    .filter-reset-btn { padding:7px 16px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; color:#64748b; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; margin-left:auto; display:flex; align-items:center; gap:5px; }

    .filter-result-banner { background:#eff6ff; border:1px solid #bfdbfe; border-radius:10px; padding:10px 16px; display:none; align-items:center; gap:10px; font-size:13px; color:#2563eb; font-weight:600; margin-bottom:16px; }
    .filter-result-banner.show { display:flex; }

    .chart-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px; }
    .chart-card { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:20px; margin-bottom:18px; }
    .chart-title { font-size:14px; font-weight:700; color:#1e293b; margin-bottom:16px; display:flex; align-items:center; gap:7px; }
    .chart-wrap      { position:relative; height:220px; }
    .chart-wrap-tall { position:relative; height:260px; }

    .system-status { display:flex; align-items:center; gap:8px; background:#dcfce7; color:#16a34a; padding:6px 14px; border-radius:20px; font-size:13px; font-weight:600; }
    .status-dot { width:8px; height:8px; background:#16a34a; border-radius:50%; animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .date-text { font-size:13px; color:#94a3b8; margin-bottom:20px; }
  </style>
</head>
<body>
  <aside>
    <div class="logo">
      <img src="https://public.readdy.ai/ai/img_res/f3ccc83c-cf23-4ebf-b376-21d351a806b7.png" alt="로고" />
      <div class="logo-text"><div class="title">스마트 현장</div><div class="sub">안전관제 시스템</div></div>
    </div>
    <nav>
      <!-- 자료실 하위 메뉴 (맨 위 고정) -->
      <div class="nav-group">
        <div class="nav-group-title open" id="navGroupTitle" onclick="toggleNav()">
          <i class="ri-folder-chart-line"></i> 자료실
          <i class="ri-arrow-down-s-line nav-arrow open" id="navArrow"></i>
        </div>
        <div class="nav-sub open" id="navSub">
          <a href="/dashboard" class="active"><i class="ri-bar-chart-2-line"></i> 통계실</a>
          <a href="/archive" ><i class="ri-file-list-3-line"></i> 보고서 기록실</a>
        </div>
      </div>
      <a href="/upload" ><i class="ri-camera-line"></i> 현장 모니터링</a>
      <a href="/video-upload" ><i class="ri-video-upload-line"></i> 영상 분석</a>
      <a href="/reports" ><i class="ri-file-chart-line"></i> AI 보고서</a>
    </nav>
    <div class="user-section">
      <div class="user-info">
        <div class="user-avatar"><i class="ri-user-line"></i></div>
        <div>
          <div class="user-name" id="sidebarUser">관리자</div>
          <div class="user-role">현장 관리자</div>
        </div>
      </div>
      <button class="logout-btn" onclick="window.location.href='/'"><i class="ri-logout-box-r-line"></i> 로그아웃</button>
    </div>
  </aside>

  <main>
    <div class="inner">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <h2 style="margin:0">📈 통계실</h2>
        <div class="system-status"><div class="status-dot"></div>시스템 정상</div>
      </div>
      <div class="date-text" id="dateText"></div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-header"><div class="stat-label">총 분석 보고서</div><div class="stat-icon blue"><i class="ri-file-chart-line"></i></div></div>
          <div class="stat-value" id="totalCount">0</div><div class="stat-desc">건 누적 분석</div>
        </div>
        <div class="stat-card">
          <div class="stat-header"><div class="stat-label">위험 감지</div><div class="stat-icon red"><i class="ri-alarm-warning-line"></i></div></div>
          <div class="stat-value" id="dangerCount">0</div><div class="stat-desc">건 RISK 등급</div>
        </div>
        <div class="stat-card">
          <div class="stat-header"><div class="stat-label">미조치 보고서</div><div class="stat-icon yellow"><i class="ri-error-warning-line"></i></div></div>
          <div class="stat-value" id="unresolvedCount">0</div><div class="stat-desc">건 처리 대기 중</div>
        </div>
        <div class="stat-card">
          <div class="stat-header"><div class="stat-label">조치 완료</div><div class="stat-icon green"><i class="ri-shield-check-line"></i></div></div>
          <div class="stat-value" id="resolvedCount">0</div><div class="stat-desc">건 처리 완료</div>
        </div>
      </div>

      <!-- 필터 -->
      <div class="filter-section">
        <div class="filter-section-title">
          <i class="ri-filter-3-line"></i> 검색 필터
          <button class="filter-reset-btn" onclick="resetAllFilters()" style="margin-left:auto;">
            <i class="ri-refresh-line"></i> 초기화
          </button>
        </div>
        <div class="filter-rows">
          <div class="filter-row">
            <span class="filter-label">기간</span>
            <button class="period-btn active" onclick="setPeriod(7,this)">7일</button>
            <button class="period-btn" onclick="setPeriod(30,this)">30일</button>
            <button class="period-btn" onclick="setPeriod(90,this)">90일</button>
            <button class="period-btn" onclick="setPeriod(0,this)">전체</button>
            <input type="date" class="period-input" id="statFrom" onchange="applyCustomPeriod()" />
            <span style="font-size:12px;color:#94a3b8;">~</span>
            <input type="date" class="period-input" id="statTo" onchange="applyCustomPeriod()" />
          </div>
          <div class="filter-row">
            <span class="filter-label">위험등급</span>
            <select class="filter-select" id="filterGrade" onchange="applyFilters()">
              <option value="">전체</option>
              <option value="RISK">위험</option>
              <option value="NORMAL">정상</option>
            </select>
          </div>
          <div class="filter-row">
            <span class="filter-label">조치상태</span>
            <select class="filter-select" id="filterAction" onchange="applyFilters()">
              <option value="">전체</option>
              <option value="미조치">미조치</option>
              <option value="조치완료">조치완료</option>
            </select>
          </div>
          <div class="filter-row">
            <span class="filter-label">담당자</span>
            <select class="filter-select" id="filterPerson" onchange="applyFilters()">
              <option value="">전체</option>
              <option value="손광민">손광민</option>
              <option value="정재학">정재학</option>
            </select>
          </div>
          <div class="filter-row">
            <span class="filter-label">사고유형</span>
            <button class="type-btn" data-type="보호구미착용" onclick="toggleType(this)">⛑️ 보호구 미착용</button>
            <button class="type-btn" data-type="중장비접근"   onclick="toggleType(this)">🚜 중장비 접근</button>
            <button class="type-btn" data-type="낙하물"       onclick="toggleType(this)">📦 낙하물</button>
            <button class="type-btn" data-type="위험구역출입" onclick="toggleType(this)">🚧 위험구역 출입</button>
            <button class="type-btn" data-type="자재걸림"     onclick="toggleType(this)">⚠️ 자재 걸림</button>
          </div>
        </div>
      </div>

      <div class="filter-result-banner" id="filterResultBanner">
        <i class="ri-filter-line"></i>
        <span id="filterResultText">필터 적용 중...</span>
      </div>

      <div class="chart-grid-2">
        <div class="chart-card" style="margin-bottom:0;">
          <div class="chart-title"><i class="ri-pie-chart-line"></i> 위험 등급 분포</div>
          <div class="chart-wrap"><canvas id="gradeChart"></canvas></div>
        </div>
        <div class="chart-card" style="margin-bottom:0;">
          <div class="chart-title"><i class="ri-pie-chart-2-line"></i> 조치 상태 현황</div>
          <div class="chart-wrap"><canvas id="actionChart"></canvas></div>
        </div>
      </div>
      <div style="margin-bottom:18px;"></div>

      <div class="chart-card">
        <div class="chart-title"><i class="ri-bar-chart-grouped-line"></i> 사고 유형별 발생 건수</div>
        <div class="chart-wrap"><canvas id="typeChart"></canvas></div>
      </div>

      <div class="chart-card">
        <div class="chart-title"><i class="ri-bar-chart-line"></i> 기간별 보고서 발생 추이</div>
        <div class="chart-wrap-tall"><canvas id="dailyChart"></canvas></div>
      </div>
    </div>
  </main>

  <script>
    const BASE_URL = 'https://safety-server-oqza.onrender.com';
    let allReports = [];
    let gradeChart, actionChart, typeChart, dailyChart;
    let currentPeriodDays = 7;
    let activeTypes = new Set();

    const user = localStorage.getItem('username') || 'admin';
    document.getElementById('sidebarUser').textContent = user === 'admin2' ? '정재학 (admin2)' : '손광민 (admin)';

    function updateDate() {
      const now = new Date();
      const days = ['일','월','화','수','목','금','토'];
      document.getElementById('dateText').textContent =
        `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
    }
    updateDate();

    function toggleNav() {
      document.getElementById('navSub').classList.toggle('open');
      document.getElementById('navArrow').classList.toggle('open');
      document.getElementById('navGroupTitle').classList.toggle('open');
    }

    async function loadData() {
      try {
        // 통계 API 호출
        const params = new URLSearchParams();
        if (currentPeriodDays !== 'all') params.set('days', currentPeriodDays);
        const statFrom = document.getElementById('statFrom').value;
        const statTo   = document.getElementById('statTo').value;
        if (statFrom) params.set('from', statFrom);
        if (statTo)   params.set('to', statTo);
        const grade  = document.getElementById('filterGrade').value;
        const action = document.getElementById('filterAction').value;
        const person = document.getElementById('filterPerson').value;
        if (grade)  params.set('grade', grade);
        if (action) params.set('action', action);
        if (person) params.set('person', person);
        if (activeTypes.size > 0) params.set('type', [...activeTypes][0]);

        const res  = await fetch(BASE_URL + '/api/stats?' + params.toString());
        const data = await res.json();

        // 통계 카드 업데이트
        document.getElementById('totalCount').textContent      = data.total || 0;
        document.getElementById('dangerCount').textContent     = data.danger || 0;
        document.getElementById('unresolvedCount').textContent = data.unresolved || 0;
        document.getElementById('resolvedCount').textContent   = data.resolved || 0;

        // 차트 업데이트
        renderChartsFromStats(data);

        // 보고서 목록은 기존 API
        const res2  = await fetch(BASE_URL + '/api/reports');
        const data2 = await res2.json();
        allReports = data2.reports || [];
        applyFilters();
      } catch (err) { console.error(err); }
    }

    function setPeriod(days, btn) {
      currentPeriodDays = days;
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('statFrom').value = '';
      document.getElementById('statTo').value   = '';
      applyFilters();
    }

    function applyCustomPeriod() {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      currentPeriodDays = -1;
      applyFilters();
    }

    function toggleType(btn) {
      const type = btn.dataset.type;
      if (activeTypes.has(type)) { activeTypes.delete(type); btn.classList.remove('active'); }
      else { activeTypes.add(type); btn.classList.add('active'); }
      applyFilters();
    }

    function applyFilters() {
      loadData(); return;
      const from   = document.getElementById('statFrom').value;
      const to     = document.getElementById('statTo').value;
      const grade  = document.getElementById('filterGrade').value;
      const action = document.getElementById('filterAction').value;
      const person = document.getElementById('filterPerson').value;

      let filtered = allReports;

      if (currentPeriodDays > 0) {
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - currentPeriodDays);
        filtered = filtered.filter(r => r.created_at && new Date(r.created_at) >= cutoff);
      } else if (from || to) {
        filtered = filtered.filter(r => {
          const d = r.created_at ? r.created_at.slice(0,10) : '';
          if (from && d < from) return false;
          if (to   && d > to)   return false;
          return true;
        });
      }

      if (grade)  filtered = filtered.filter(r => r.detection_status === grade);
      if (action) filtered = filtered.filter(r => (r.action_status || '미조치') === action);
      if (person) filtered = filtered.filter(r => r.created_by_name === person);

      if (activeTypes.size > 0) {
        filtered = filtered.filter(r => {
          let cases = [];
          try { cases = JSON.parse(r.report_content || '{}').detected_cases || []; } catch(_) {}
          if (r.case_name) cases.push(r.case_name);
          return [...activeTypes].some(t => cases.some(c => c.includes(t.replace(/미착용|접근|출입|걸림/, '').trim())));
        });
      }

      const banner   = document.getElementById('filterResultBanner');
      const hasFilter = grade || action || person || activeTypes.size > 0 || currentPeriodDays !== 7 || from || to;
      if (hasFilter) {
        banner.classList.add('show');
        document.getElementById('filterResultText').textContent =
          `필터 적용 중 · ${filtered.length}건 / 전체 ${allReports.length}건`;
      } else {
        banner.classList.remove('show');
      }

      renderCharts(filtered);
    }

    function resetAllFilters() {
      currentPeriodDays = 7;
      document.querySelectorAll('.period-btn').forEach((b,i) => b.classList.toggle('active', i===0));
      document.getElementById('statFrom').value   = '';
      document.getElementById('statTo').value     = '';
      document.getElementById('filterGrade').value  = '';
      document.getElementById('filterAction').value = '';
      document.getElementById('filterPerson').value = '';
      activeTypes.clear();
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('filterResultBanner').classList.remove('show');
      applyFilters();
    }

    function renderChartsFromStats(data) {
      const danger     = data.danger || 0;
      const normal     = data.normal || 0;
      const unresolved = data.unresolved || 0;
      const resolved   = data.resolved || 0;
      const byCase     = data.byCase || [];
      const daily      = (data.daily || []).reverse();

      if (gradeChart)  gradeChart.destroy();
      if (actionChart) actionChart.destroy();
      if (typeChart)   typeChart.destroy();
      if (dailyChart)  dailyChart.destroy();

      gradeChart = new Chart(document.getElementById('gradeChart'), {
        type:'doughnut',
        data:{ labels:['위험','정상'], datasets:[{ data:[danger,normal], backgroundColor:['#dc2626','#22c55e'], borderWidth:0 }] },
        options:{ responsive:true, maintainAspectRatio:false, cutout:'65%', plugins:{ legend:{ position:'bottom' } } }
      });

      actionChart = new Chart(document.getElementById('actionChart'), {
        type:'doughnut',
        data:{ labels:['미조치','조치완료'], datasets:[{ data:[unresolved,resolved], backgroundColor:['#ef4444','#22c55e'], borderWidth:0 }] },
        options:{ responsive:true, maintainAspectRatio:false, cutout:'65%', plugins:{ legend:{ position:'bottom' } } }
      });

      if (byCase.length > 0) {
        typeChart = new Chart(document.getElementById('typeChart'), {
          type:'bar',
          data:{ labels: byCase.map(c=>c.case_name), datasets:[{ label:'발생 횟수', data: byCase.map(c=>c.count), backgroundColor:'#3b82f6', borderRadius:6 }] },
          options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true } } }
        });
      }

      if (daily.length > 0) {
        dailyChart = new Chart(document.getElementById('dailyChart'), {
          type:'bar',
          data:{
            labels: daily.map(d=>d.date),
            datasets:[
              { label:'위험', data: daily.map(d=>d.danger), backgroundColor:'#dc2626', borderRadius:4 },
              { label:'정상', data: daily.map(d=>d.normal), backgroundColor:'#22c55e', borderRadius:4 }
            ]
          },
          options:{ responsive:true, maintainAspectRatio:false, scales:{ x:{ stacked:true }, y:{ stacked:true, beginAtZero:true } } }
        });
      }
    }

    function renderStats(reports) {
      const total      = reports.length;
      const danger     = reports.filter(r => r.detection_status === 'RISK').length;
      const unresolved = reports.filter(r => !r.action_status || r.action_status === '미조치').length;
      const resolved   = reports.filter(r => r.action_status === '조치완료').length;
      document.getElementById('totalCount').textContent      = total;
      document.getElementById('dangerCount').textContent     = danger;
      document.getElementById('unresolvedCount').textContent = unresolved;
      document.getElementById('resolvedCount').textContent   = resolved;
    }

    function renderCharts(reports) {
      const danger     = reports.filter(r => r.detection_status === 'RISK').length;
      const normal     = reports.filter(r => r.detection_status === 'NORMAL').length;
      const unresolved = reports.filter(r => !r.action_status || r.action_status === '미조치').length;
      const resolved   = reports.filter(r => r.action_status === '조치완료').length;

      if (gradeChart)  gradeChart.destroy();
      if (actionChart) actionChart.destroy();
      if (typeChart)   typeChart.destroy();
      if (dailyChart)  dailyChart.destroy();

      gradeChart = new Chart(document.getElementById('gradeChart'), {
        type:'doughnut',
        data:{ labels:['위험','정상'], datasets:[{ data:[danger,normal], backgroundColor:['#dc2626','#22c55e'], borderWidth:0, hoverOffset:6 }] },
        options:{ responsive:true, maintainAspectRatio:false, cutout:'65%', plugins:{ legend:{ position:'bottom', labels:{ font:{size:12}, padding:14 } } } }
      });

      actionChart = new Chart(document.getElementById('actionChart'), {
        type:'doughnut',
        data:{ labels:['미조치','조치완료'], datasets:[{ data:[unresolved,resolved], backgroundColor:['#ef4444','#22c55e'], borderWidth:0, hoverOffset:6 }] },
        options:{ responsive:true, maintainAspectRatio:false, cutout:'65%', plugins:{ legend:{ position:'bottom', labels:{ font:{size:12}, padding:14 } } } }
      });

      // 사고 유형별 집계
      const caseCounts = { '보호구 미착용':0, '중장비 접근 사고':0, '자재물 낙하/추락 위험':0, '위험구역 출입 사고':0, '자재물로 인한 걸림/넘어짐':0 };
      reports.forEach(r => {
        let cases = [];
        try { cases = JSON.parse(r.report_content || '{}').detected_cases || []; } catch(_) {}
        if (r.case_name && !cases.includes(r.case_name)) cases.push(r.case_name);
        cases.forEach(c => { if (caseCounts[c] !== undefined) caseCounts[c]++; });
      });

      typeChart = new Chart(document.getElementById('typeChart'), {
        type:'bar',
        data:{
          labels:['보호구 미착용','중장비 접근','낙하물','위험구역 출입','자재 걸림'],
          datasets:[{ label:'발생 건수', data:Object.values(caseCounts), backgroundColor:['#dc2626','#f97316','#f59e0b','#8b5cf6','#ec4899'], borderRadius:6 }]
        },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ x:{ grid:{ display:false } }, y:{ beginAtZero:true, ticks:{ stepSize:1 }, grid:{ color:'#f1f5f9' } } } }
      });

      const numDays = currentPeriodDays > 0 ? Math.min(currentPeriodDays,30) : 14;
      const days = [], dc = { 위험:[], 정상:[] };
      for (let i = numDays-1; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate()-i);
        days.push(`${d.getMonth()+1}/${d.getDate()}`);
        const ds = d.toISOString().slice(0,10);
        const dr = reports.filter(r => r.created_at && r.created_at.slice(0,10) === ds);
        dc['위험'].push(dr.filter(r=>r.detection_status==='RISK').length);
        dc['정상'].push(dr.filter(r=>r.detection_status==='NORMAL').length);
      }
      dailyChart = new Chart(document.getElementById('dailyChart'), {
        type:'bar',
        data:{ labels:days, datasets:[
          { label:'위험', data:dc['위험'], backgroundColor:'#dc2626', borderRadius:4 },
          { label:'정상', data:dc['정상'], backgroundColor:'#22c55e', borderRadius:4 },
        ]},
        options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ font:{size:12}, padding:14 } } }, scales:{ x:{ stacked:true, grid:{ display:false } }, y:{ stacked:true, beginAtZero:true, ticks:{ stepSize:1 } } } }
      });
    }

    loadData();
    setInterval(loadData, 30000);
  </script>
</body>
</html>
