<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 안전 분석 보고서</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" />
  <link rel="stylesheet" href="/reports.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
    .report-wrap { max-width: 780px; margin: 0 auto; padding: 24px 16px 60px; }
    .top-bar { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
    .back-btn { background:#fff; border:1px solid #e2e8f0; padding:8px 14px; border-radius:8px; cursor:pointer; font-size:13px; color:#475569; display:flex; align-items:center; gap:6px; }
    .report-title { font-size:15px; font-weight:700; color:#1e293b; }
    .main-image { width:100%; height:260px; border-radius:16px; margin-bottom:20px; background:#e2e8f0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .main-image img { width:100%; height:100%; object-fit:cover; }
    .no-image { color:#94a3b8; font-size:14px; text-align:center; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:22px; margin-bottom:16px; }
    .card-title { display:flex; align-items:center; gap:8px; font-size:15px; font-weight:700; color:#1e293b; margin-bottom:16px; }
    .card-num { width:26px; height:26px; background:#1e293b; color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }

    /* 위험도 섹션 */
    .risk-big { display:flex; align-items:center; gap:20px; margin-bottom:16px; }
    .risk-circle { width:90px; height:90px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0; }
    .risk-score { font-size:26px; font-weight:800; }
    .risk-pct { font-size:11px; font-weight:600; margin-top:2px; }
    .risk-info h3 { font-size:16px; font-weight:700; color:#1e293b; margin-bottom:4px; }
    .risk-info p { font-size:13px; color:#64748b; }
    .risk-badge { display:inline-block; font-size:12px; font-weight:700; padding:3px 12px; border-radius:20px; margin-top:6px; }
    .grade-고위험 .risk-circle { background:#fee2e2; }
    .grade-고위험 .risk-score  { color:#dc2626; }
    .grade-고위험 .risk-pct    { color:#dc2626; }
    .grade-고위험 .risk-badge  { background:#fee2e2; color:#dc2626; }
    .grade-관찰 .risk-circle   { background:#fef3c7; }
    .grade-관찰 .risk-score    { color:#d97706; }
    .grade-관찰 .risk-pct      { color:#d97706; }
    .grade-관찰 .risk-badge    { background:#fef3c7; color:#d97706; }
    .grade-정상 .risk-circle   { background:#dcfce7; }
    .grade-정상 .risk-score    { color:#16a34a; }
    .grade-정상 .risk-pct      { color:#16a34a; }
    .grade-정상 .risk-badge    { background:#dcfce7; color:#16a34a; }

    /* 감지 케이스 뱃지 */
    .case-badges { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .case-badge {
      padding:5px 14px; border-radius:20px; font-size:12px; font-weight:700;
      display:flex; align-items:center; gap:5px;
    }
    .case-badge.보호구  { background:#fee2e2; color:#dc2626; }
    .case-badge.중장비  { background:#fff7ed; color:#ea580c; }
    .case-badge.낙하물  { background:#fef3c7; color:#d97706; }
    .case-badge.위험구역 { background:#f3e8ff; color:#9333ea; }
    .case-badge.자재    { background:#fdf2f8; color:#db2777; }

    /* 보고서 정보 그리드 */
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
    .info-item { background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:12px; }
    .info-label { font-size:11px; color:#94a3b8; margin-bottom:4px; }
    .info-value { font-size:14px; font-weight:700; color:#1e293b; }

    /* 권고사항 */
    .rec-item { display:flex; gap:10px; align-items:flex-start; padding:10px 0; border-bottom:1px solid #f1f5f9; }
    .rec-item:last-child { border-bottom:none; }
    .rec-dot { width:8px; height:8px; background:#f59e0b; border-radius:50%; flex-shrink:0; margin-top:5px; }
    .rec-text { font-size:13px; color:#334155; line-height:1.6; }

    /* 종합평가 */
    .eval-text { font-size:14px; color:#475569; line-height:1.8; margin-bottom:16px; }
    .law-box { background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:14px; }
    .law-title { font-size:12px; color:#94a3b8; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
    .law-content { font-size:13px; color:#334155; line-height:1.7; }

    /* ── 조치 상태 UI ── */
    .action-current-badge {
      margin-left:auto; font-size:12px; font-weight:700;
      padding:4px 12px; border-radius:20px;
      display:flex; align-items:center; gap:5px;
    }
    .action-current-badge .dot { width:7px; height:7px; border-radius:50%; background:currentColor; animation:blink 1.6s ease-in-out infinite; }
    .action-current-badge.미조치  { background:#fee2e2; color:#dc2626; }
    .action-current-badge.조치중  { background:#fef3c7; color:#d97706; }
    .action-current-badge.조치완료 { background:#dcfce7; color:#16a34a; }
    .action-current-badge.조치완료 .dot { animation:none; }
    .action-current-badge.조치완료 .dot { animation:none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .status-btn-group { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:16px; }
    .status-btn {
      border:2px solid #e2e8f0; border-radius:12px; background:#f8fafc;
      cursor:pointer; padding:14px 8px;
      display:flex; flex-direction:column; align-items:center; gap:7px;
      transition:all .2s; font-family:inherit;
    }
    .status-btn:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.08); }
    .status-btn .sb-icon  { font-size:24px; }
    .status-btn .sb-label { font-size:13px; font-weight:700; color:#1e293b; }
    .status-btn .sb-sub   { font-size:11px; color:#94a3b8; }
    .status-btn.btn-unresolved.active { border-color:#dc2626; background:#fee2e2; }
    .status-btn.btn-unresolved.active .sb-label { color:#dc2626; }
    .status-btn.btn-resolved.active   { border-color:#16a34a; background:#dcfce7; }
    .status-btn.btn-resolved.active .sb-label { color:#16a34a; }
    .status-btn.btn-inprogress.active { border-color:#d97706; background:#fef3c7; }
    .status-btn.btn-inprogress.active .sb-label { color:#d97706; }

    .action-panel {
      display:none; flex-direction:column; gap:12px;
      background:#f8fafc; border:1px solid #e2e8f0;
      border-radius:12px; padding:16px; margin-bottom:16px;
      animation:fadeIn .2s ease;
    }
    .action-panel.visible { display:flex; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    .panel-title { font-size:13px; font-weight:700; padding-bottom:10px; border-bottom:1px solid #e2e8f0; display:flex; align-items:center; gap:6px; }
    .panel-title.red   { color:#dc2626; }
    .panel-title.green { color:#16a34a; }

    .form-group { display:flex; flex-direction:column; gap:5px; }
    .form-label { font-size:12px; color:#64748b; font-weight:600; }
    .form-textarea {
      background:#fff; border:1px solid #e2e8f0; border-radius:8px;
      padding:9px 12px; font-size:13px; font-family:inherit; color:#1e293b;
      outline:none; transition:border-color .2s; resize:vertical; min-height:72px;
    }
    .form-textarea:focus { border-color:#3b82f6; }

    .action-save-row { display:flex; align-items:center; gap:10px; }
    .save-btn {
      background:#1e293b; color:#fff; border:none; border-radius:10px;
      padding:11px 24px; font-size:13px; font-weight:700; cursor:pointer;
      font-family:inherit; display:flex; align-items:center; gap:7px; transition:all .2s;
    }
    .save-btn:hover { background:#0f172a; transform:translateY(-1px); }
    .save-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .save-msg { font-size:12px; font-weight:600; opacity:0; transition:opacity .3s; }
    .save-msg.ok  { color:#16a34a; opacity:1; }
    .save-msg.err { color:#dc2626; opacity:1; }

    .bottom-msg { background:#1e293b; border-radius:16px; padding:20px; text-align:center; color:#fff; font-size:14px; font-style:italic; margin-top:8px; }

    /* 위험요소 감지 결과 */
    .det-result-item { background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:14px 16px; margin-bottom:10px; }
    .det-result-item:last-child { margin-bottom:0; }
    .det-result-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .det-result-icon { font-size:20px; }
    .det-result-name { font-size:14px; font-weight:700; color:#1e293b; flex:1; }
    .det-result-grade { font-size:11px; font-weight:700; padding:3px 10px; border-radius:12px; }
    .det-result-grade.고위험 { background:#fee2e2; color:#dc2626; }
    .det-result-grade.주의   { background:#fef3c7; color:#d97706; }
    .det-result-grade.관찰   { background:#e0f2fe; color:#0369a1; }
    .det-result-desc { font-size:12px; color:#64748b; line-height:1.6; }

    /* 법규 */
    .law-item { border:1px solid #e2e8f0; border-radius:12px; overflow:hidden; margin-bottom:10px; }
    .law-item:last-child { margin-bottom:0; }
    .law-item-header { background:#f1f5f9; padding:10px 14px; display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700; color:#1e293b; }
    .law-item-body { padding:12px 14px; font-size:12px; color:#475569; line-height:1.7; }
    .loading { text-align:center; padding:60px; color:#94a3b8; }
    .error   { text-align:center; padding:60px; color:#ef4444; }
      /* 자료실 하위 메뉴 */
    .nav-group-title { display:flex; align-items:center; gap:10px; padding:10px 16px; color:#94a3b8; font-size:13px; cursor:pointer; transition:all .2s; user-select:none; }
    .nav-group-title:hover { background:rgba(255,255,255,.05); color:#fff; }
    .nav-group-title.open { color:#fff; }
    .nav-arrow { margin-left:auto; transition:transform .2s; font-size:14px; }
    .nav-arrow.open { transform:rotate(180deg); }
    .nav-sub { display:none; flex-direction:column; gap:2px; padding-left:14px; margin-top:2px; }
    .nav-sub.open { display:flex; }
    .nav-sub a { display:flex; align-items:center; gap:8px; padding:8px 14px; border-radius:8px; color:#94a3b8; font-size:12px; text-decoration:none; transition:all .2s; }
    .nav-sub a:hover { background:rgba(255,255,255,.05); color:#fff; }
    .nav-sub a.active { background:rgba(59,130,246,.15); color:#60a5fa; font-weight:600; }
  </style>
</head>
<body>
<div class="report-wrap">
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()"><i class="ri-arrow-left-line"></i> 목록으로</button>
    <span class="report-title" id="pageTitle">AI 안전 분석 보고서</span>
  </div>

  <div id="loadingState" class="loading">보고서를 불러오는 중...</div>
  <div id="errorState" class="error" style="display:none"></div>
  <div id="content" style="display:none">

    <!-- 대표 이미지 -->
    <div class="main-image" id="mainImageWrap">
      <div class="no-image"><i class="ri-image-line" style="font-size:32px;display:block;margin-bottom:8px;"></i>대표 스냅샷</div>
    </div>

    <!-- 카드 1: AI 등급 평가 -->
    <div class="card" id="riskCard">
      <div class="card-title"><span class="card-num">1</span> AI 사고예측 및 등급 평가</div>
      <div class="risk-big">
        <div class="risk-circle">
          <span class="risk-score" id="riskScore">-</span>
          <span class="risk-pct">%</span>
        </div>
        <div class="risk-info">
          <h3>예측된 위험도: <span id="riskScoreText">-</span>%</h3>
          <p>현재 등급: <span id="riskGradeText">-</span></p>
          <span class="risk-badge" id="riskBadge">-</span>
        </div>
      </div>

      <!-- 감지된 사고 케이스 -->
      <div class="case-badges" id="caseBadges"></div>

      <!-- 보고서 정보 -->
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">보고서 제목</div>
          <div class="info-value" id="reportTitle" style="font-size:12px;">-</div>
        </div>
        <div class="info-item">
          <div class="info-label">분석 일시</div>
          <div class="info-value" id="reportDate" style="font-size:12px;">-</div>
        </div>
        <div class="info-item">
          <div class="info-label">작성자</div>
          <div class="info-value" id="createdBy">-</div>
        </div>
        <div class="info-item">
          <div class="info-label">사고 케이스</div>
          <div class="info-value" id="caseName">-</div>
        </div>
      </div>
    </div>

    <!-- 카드 2: AI 주요 위험요소 감지 결과 -->
    <div class="card">
      <div class="card-title"><span class="card-num">2</span> AI 주요 위험요소 감지 결과</div>
      <div id="detectionResultList"></div>
    </div>

    <!-- 카드 3: 관련 법규 -->
    <div class="card">
      <div class="card-title"><span class="card-num">3</span> 관련 법규</div>
      <div id="lawList"></div>
    </div>

    <!-- 카드 4: 권고 및 대응 조치사항 -->
    <div class="card">
      <div class="card-title"><span class="card-num">4</span> 권고 및 대응 조치사항</div>
      <div id="recList"></div>
    </div>

    <!-- 카드 5: 종합평가 -->
    <div class="card">
      <div class="card-title"><span class="card-num">5</span> 종합평가</div>
      <p class="eval-text" id="summaryEval">-</p>
    </div>

    <!-- 카드 4: 조치 상태 -->
    <div class="card">
      <div class="card-title">
        <span class="card-num">6</span> 조치 상태 관리
        <div class="action-current-badge 미조치" id="currentBadge">
          <div class="dot"></div>
          <span id="currentBadgeText">미조치</span>
        </div>
      </div>

      <div class="status-btn-group">
        <button class="status-btn btn-unresolved" id="btnUnresolved" onclick="selectStatus('미조치')">
          <span class="sb-icon">🚨</span>
          <span class="sb-label">미조치</span>
          <span class="sb-sub">처리 전</span>
        </button>
        <button class="status-btn btn-inprogress" id="btnInprogress" onclick="selectStatus('조치중')">
          <span class="sb-icon">⏳</span>
          <span class="sb-label">조치 중</span>
          <span class="sb-sub">처리 예정</span>
        </button>
        <button class="status-btn btn-resolved" id="btnResolved" onclick="selectStatus('조치완료')">
          <span class="sb-icon">✅</span>
          <span class="sb-label">조치 완료</span>
          <span class="sb-sub">처리 완료</span>
        </button>
      </div>

      <!-- 미조치 패널 -->
      <div class="action-panel" id="panelUnresolved">
        <div class="panel-title red">🚨 미조치 사유 입력</div>
        <div class="form-group">
          <label class="form-label">미조치 사유</label>
          <textarea class="form-textarea" id="unresNote" placeholder="조치하지 못한 이유를 입력하세요..."></textarea>
        </div>
      </div>

      <!-- 조치중 패널 -->
      <div class="action-panel" id="panelInprogress">
        <div class="panel-title" style="color:#d97706;">⏳ 처리 예정 내용 입력</div>
        <div class="form-group">
          <label class="form-label">처리 예정 내용</label>
          <textarea class="form-textarea" id="inprogNote" placeholder="나중에 처리할 내용이나 계획을 입력하세요...&#10;예) 내일 오전 안전관리자와 협의 후 조치 예정"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">예상 처리 기한</label>
          <input type="date" class="form-textarea" id="inprogDate" style="min-height:auto;padding:8px 12px;" />
        </div>
      </div>

      <!-- 조치완료 패널 -->
      <div class="action-panel" id="panelResolved">
        <div class="panel-title green">✅ 조치 완료 내용</div>
        <div class="form-group">
          <label class="form-label">조치 완료 내용</label>
          <textarea class="form-textarea" id="resNote" placeholder="수행한 조치 내용을 상세히 입력하세요..."></textarea>
        </div>
      </div>

      <div class="action-save-row">
        <button class="save-btn" id="saveBtn" onclick="saveAction()">
          <i class="ri-save-line"></i> 저장
        </button>
        <span class="save-msg" id="saveMsg"></span>
      </div>
    </div>

    <div class="bottom-msg">"위험은 단일 요소보다 복합 구조에서 시작됩니다. AI는 감지하고, 현장은 예방합니다."</div>
  </div>
</div>

<script>
  const BASE_URL = 'https://safety-server-oqza.onrender.com';
  const reportId = location.pathname.split('/').pop();
  let selectedStatus = null;
  let reportData = null;

  const CASE_ICONS = {
    '보호구 미착용':        { icon:'⛑️', cls:'보호구' },
    '중장비 접근 사고':     { icon:'🚜', cls:'중장비' },
    '자재물 낙하/추락 위험': { icon:'📦', cls:'낙하물' },
    '위험구역 출입 사고':   { icon:'🚧', cls:'위험구역' },
    '자재물로 인한 걸림/넘어짐': { icon:'⚠️', cls:'자재' },
  };

  function formatDate(str) {
    if (!str) return '-';
    return new Date(str).toLocaleString('ko-KR');
  }

  async function load() {
    try {
      const res  = await fetch(BASE_URL + '/api/reports/' + reportId);
      if (!res.ok) throw new Error('서버 오류 ' + res.status);
      const data = await res.json();
      const r    = data.report;
      reportData = r;

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.getElementById('pageTitle').textContent = r.report_title || `보고서 #${r.report_id}`;

      // 대표 이미지
      if (r.image_path) {
        document.getElementById('mainImageWrap').innerHTML =
          `<img src="${r.image_path}" alt="분석 이미지"/>`;
      }

      // 보고서 내용 파싱
      let content = {};
      try { content = JSON.parse(r.report_content || '{}'); } catch(_) {}

      const grade = content.risk_grade || '정상';
      const score = content.risk_score || 0;

      // 위험도 카드
      document.getElementById('riskCard').className = 'card grade-' + grade;
      document.getElementById('riskScore').textContent     = score;
      document.getElementById('riskScoreText').textContent = score;
      document.getElementById('riskGradeText').textContent = grade;
      document.getElementById('riskBadge').textContent     = grade + ' 등급';

      // 감지 케이스 뱃지
      const cases = content.detected_cases || [];
      const badgesEl = document.getElementById('caseBadges');
      if (cases.length > 0) {
        badgesEl.innerHTML = cases.map(c => {
          const info = CASE_ICONS[c] || { icon:'⚠️', cls:'자재' };
          return `<span class="case-badge ${info.cls}">${info.icon} ${c}</span>`;
        }).join('');
      } else if (r.case_name) {
        const info = CASE_ICONS[r.case_name] || { icon:'⚠️', cls:'자재' };
        badgesEl.innerHTML = `<span class="case-badge ${info.cls}">${info.icon} ${r.case_name}</span>`;
      }

      // 보고서 정보
      document.getElementById('reportTitle').textContent = r.report_title || '-';
      document.getElementById('reportDate').textContent  = formatDate(r.detected_at || r.created_at);
      document.getElementById('createdBy').textContent   = r.created_by_name || '-';
      document.getElementById('caseName').textContent    = r.case_name || (cases.join(', ') || '-');

      // ── AI 주요 위험요소 감지 결과 ──────────
      const detections = content.detections || [];
      const detEl = document.getElementById('detectionResultList');
      const caseIconMap = {
        '보호구 미착용': { icon:'⛑️', grade:'고위험', desc:'안전모/안전조끼 미착용으로 인한 머리/신체 부상 위험이 감지되었습니다.' },
        '중장비 접근 사고': { icon:'🚜', grade:'고위험', desc:'중장비 운행 구역 내 작업자 접근으로 인한 충돌/협착 위험이 감지되었습니다.' },
        '자재물 낙하/추락 위험': { icon:'📦', grade:'주의', desc:'불안정한 자재 배치로 인한 낙하/추락 위험이 감지되었습니다.' },
        '위험구역 출입 사고': { icon:'🚧', grade:'고위험', desc:'지정된 위험구역에 무단 출입하는 작업자가 감지되었습니다.' },
        '자재물로 인한 걸림/넘어짐': { icon:'⚠️', grade:'관찰', desc:'통로에 방치된 자재로 인한 걸림/넘어짐 위험이 감지되었습니다.' },
      };

      const allCases = cases.length > 0 ? cases : (r.case_name ? [r.case_name] : []);
      if (allCases.length > 0) {
        detEl.innerHTML = allCases.map(c => {
          const info = caseIconMap[c] || { icon:'⚠️', grade:'주의', desc:c };
          const det = detections.find(d => d.case === c) || {};
          return `
            <div class="det-result-item">
              <div class="det-result-header">
                <span class="det-result-icon">${info.icon}</span>
                <span class="det-result-name">${c}</span>
                <span class="det-result-grade ${info.grade}">${info.grade}</span>
              </div>
              <div class="det-result-desc">${det.description || info.desc}</div>
            </div>`;
        }).join('');
      } else {
        detEl.innerHTML = '<p style="color:#94a3b8;font-size:14px;">감지된 위험요소 없음</p>';
      }

      // ── 관련 법규 ─────────────────────────
      const lawMap = {
        '보호구 미착용': { name:'산업안전보건법 제38조 (보호구 착용)', content:'사업주는 작업자에게 안전모, 안전화, 안전조끼 등 적정한 보호구를 지급하고 착용하도록 하여야 한다.' },
        '중장비 접근 사고': { name:'산업안전보건기준에 관한 규칙 제200조', content:'차량계 하역운반기계 등을 사용하는 작업 시 운행경로, 작업방법을 정하고 작업자 출입을 금지시켜야 한다.' },
        '자재물 낙하/추락 위험': { name:'산업안전보건기준에 관한 규칙 제14조', content:'낙하물에 의한 위험을 방지하기 위해 낙하물 방지망, 수직보호망 등을 설치하여야 한다.' },
        '위험구역 출입 사고': { name:'산업안전보건법 제42조 (위험구역 출입 금지)', content:'사업주는 위험물질 보관 장소, 기계 작동 구역 등 위험구역에 관계자 외 출입을 금지하여야 한다.' },
        '자재물로 인한 걸림/넘어짐': { name:'산업안전보건기준에 관한 규칙 제3조', content:'작업장 내 통로는 항상 정리정돈하여 걸림/넘어짐 위험 요소를 제거하여야 한다.' },
      };
      const lawEl = document.getElementById('lawList');
      const lawRefs = content.law_references || [];
      const lawCases = allCases.length > 0 ? allCases : (lawRefs.length > 0 ? lawRefs : []);
      if (lawCases.length > 0) {
        lawEl.innerHTML = lawCases.map(c => {
          const law = lawMap[c] || { name: r.law_name || '관련 법규', content: r.law_content || '해당 없음' };
          return `
            <div class="law-item">
              <div class="law-item-header">⚖️ ${law.name}</div>
              <div class="law-item-body">${law.content}</div>
            </div>`;
        }).join('');
      } else {
        const fallbackLaw = { name: r.law_name || '관련 법규', content: r.law_content || '해당 없음' };
        lawEl.innerHTML = `<div class="law-item"><div class="law-item-header">⚖️ ${fallbackLaw.name}</div><div class="law-item-body">${fallbackLaw.content}</div></div>`;
      }

      // ── 권고사항 ──────────────────────────
      const recMap = {
        '보호구 미착용': ['안전모 및 안전조끼 상시 착용 의무화', '작업 전 보호구 착용 여부 점검 체크리스트 운영', '보호구 미착용자 즉시 작업 중지 및 시정 조치'],
        '중장비 접근 사고': ['중장비 작업 구역 접근 제한선 설치', '중장비 작업 시 신호수 배치 의무화', '작업자-중장비 안전거리(2m 이상) 준수'],
        '자재물 낙하/추락 위험': ['자재 적재 높이 기준 준수 (2m 이하)', '낙하물 방지망 설치', '작업 구역 하부 출입 통제'],
        '위험구역 출입 사고': ['위험구역 표지판 및 차단 바리케이드 설치', '출입 허가제 운영', '위험구역 CCTV 모니터링 강화'],
        '자재물로 인한 걸림/넘어짐': ['통로 내 자재 즉시 정리', '자재 보관 구역 별도 지정', '작업 종료 후 정리정돈 체크리스트 운영'],
      };
      const recEl = document.getElementById('recList');
      const allRecs = [];
      allCases.forEach(c => {
        const cRecs = recMap[c] || (content.recommendations || []);
        cRecs.forEach(rec => { if (!allRecs.includes(rec)) allRecs.push(rec); });
      });
      if (r.recommendation && !allRecs.includes(r.recommendation)) allRecs.push(r.recommendation);
      recEl.innerHTML = allRecs.length > 0
        ? allRecs.map(rec => `<div class="rec-item"><div class="rec-dot"></div><div class="rec-text">${rec}</div></div>`).join('')
        : '<p style="color:#94a3b8;font-size:14px;">권고사항 없음</p>';

      // ── 종합평가 ──────────────────────────
      const evalMap = {
        '고위험': '즉각적인 작업 중지 및 안전 조치가 필요합니다. 현장 관리자에게 즉시 보고하고 위험 요소를 제거하기 전까지 해당 구역 출입을 통제하십시오.',
        '관찰': '현장 상황을 지속적으로 모니터링하고, 위험 요소가 악화되지 않도록 예방 조치를 시행하십시오.',
        '정상': '현재 정상 상태이나 안전 규정을 지속적으로 준수하여 사고를 예방하십시오.',
      };
      const evalText = content.summary_eval || r.description || evalMap[grade] || evalMap['정상'];
      document.getElementById('summaryEval').textContent = evalText;

      // 조치 상태
      const actionStatus = r.action_status || '미조치';
      initActionPanel(actionStatus, r.action_note);

    } catch (err) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('errorState').textContent = '오류: ' + err.message;
    }
  }

  function initActionPanel(status, note) {
    const badge = document.getElementById('currentBadge');
    badge.className = 'action-current-badge ' + status;
    document.getElementById('currentBadgeText').textContent = status;

    if (note) {
      document.getElementById('unresNote').value   = note;
      document.getElementById('inprogNote').value  = note;
      document.getElementById('resNote').value     = note;
    }
    selectStatus(status, false);
  }

  function selectStatus(status, updateUI = true) {
    selectedStatus = status;
    document.getElementById('btnUnresolved').classList.toggle('active',  status === '미조치');
    document.getElementById('btnInprogress').classList.toggle('active',  status === '조치중');
    document.getElementById('btnResolved').classList.toggle('active',    status === '조치완료');
    document.getElementById('panelUnresolved').classList.toggle('visible', status === '미조치');
    document.getElementById('panelInprogress').classList.toggle('visible', status === '조치중');
    document.getElementById('panelResolved').classList.toggle('visible',   status === '조치완료');
  }

  async function saveAction() {
    if (!selectedStatus) { alert('조치 상태를 선택해주세요.'); return; }

    let note = '';
    if (selectedStatus === '미조치')   note = document.getElementById('unresNote').value.trim();
    else if (selectedStatus === '조치중') {
      const deadline = document.getElementById('inprogDate').value;
      note = document.getElementById('inprogNote').value.trim();
      if (deadline) note += (note ? '\n' : '') + '처리 기한: ' + deadline;
    }
    else if (selectedStatus === '조치완료') note = document.getElementById('resNote').value.trim();

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="ri-loader-4-line"></i> 저장 중...';

    try {
      const res = await fetch(BASE_URL + '/api/reports/' + reportId + '/action', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action_status: selectedStatus, action_note: note })
      });
      if (!res.ok) throw new Error('저장 실패 ' + res.status);

      const badge = document.getElementById('currentBadge');
      badge.className = 'action-current-badge ' + selectedStatus;
      document.getElementById('currentBadgeText').textContent = selectedStatus;

      showMsg('✅ 저장되었습니다!', 'ok');
    } catch (err) {
      showMsg('❌ ' + err.message, 'err');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="ri-save-line"></i> 저장';
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('saveMsg');
    el.textContent = text;
    el.className = 'save-msg ' + type;
    setTimeout(() => { el.className = 'save-msg'; }, 3000);
  }

  load();
    function toggleNav() {
      const sub = document.getElementById('navSub');
      const arrow = document.getElementById('navArrow');
      const title = document.getElementById('navGroupTitle');
      if (sub) { sub.classList.toggle('open'); arrow.classList.toggle('open'); title.classList.toggle('open'); }
    }
  </script>
</body>
