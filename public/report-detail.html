<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 안전 분석 보고서</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" />
  <link rel="stylesheet" href="/reports.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
    .report-wrap { max-width: 780px; margin: 0 auto; padding: 24px 16px 60px; }

    /* 상단 헤더 */
    .top-bar { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
    .back-btn { background:#fff; border:1px solid #e2e8f0; padding:8px 14px; border-radius:8px; cursor:pointer; font-size:13px; color:#475569; display:flex; align-items:center; gap:6px; }
    .report-title { font-size:15px; font-weight:700; color:#1e293b; }

    /* 대표 이미지 */
    .main-image { width:100%; height:260px; object-fit:cover; border-radius:16px; margin-bottom:20px; background:#e2e8f0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .main-image img { width:100%; height:100%; object-fit:cover; }
    .no-image { color:#94a3b8; font-size:14px; text-align:center; }

    /* 카드 공통 */
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:22px; margin-bottom:16px; }
    .card-title { display:flex; align-items:center; gap:8px; font-size:15px; font-weight:700; color:#1e293b; margin-bottom:16px; }
    .card-num { width:26px; height:26px; background:#1e293b; color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }

    /* 위험도 카드 */
    .risk-big { display:flex; align-items:center; gap:20px; margin-bottom:16px; }
    .risk-circle { width:90px; height:90px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0; }
    .risk-score { font-size:26px; font-weight:800; }
    .risk-pct { font-size:11px; font-weight:600; margin-top:2px; }
    .risk-info h3 { font-size:16px; font-weight:700; color:#1e293b; margin-bottom:4px; }
    .risk-info p { font-size:13px; color:#64748b; }
    .risk-badge { display:inline-block; font-size:12px; font-weight:700; padding:3px 12px; border-radius:20px; margin-top:6px; }

    .grade-고위험 .risk-circle { background:#fee2e2; }
    .grade-고위험 .risk-score { color:#dc2626; }
    .grade-고위험 .risk-pct { color:#dc2626; }
    .grade-고위험 .risk-badge { background:#fee2e2; color:#dc2626; }
    .grade-관찰 .risk-circle { background:#fef3c7; }
    .grade-관찰 .risk-score { color:#d97706; }
    .grade-관찰 .risk-pct { color:#d97706; }
    .grade-관찰 .risk-badge { background:#fef3c7; color:#d97706; }
    .grade-정상 .risk-circle { background:#dcfce7; }
    .grade-정상 .risk-score { color:#16a34a; }
    .grade-정상 .risk-pct { color:#16a34a; }
    .grade-정상 .risk-badge { background:#dcfce7; color:#16a34a; }

    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
    .stat-item { background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:12px; }
    .stat-label { font-size:11px; color:#94a3b8; margin-bottom:4px; }
    .stat-value { font-size:20px; font-weight:800; color:#1e293b; }
    .stat-value.danger { color:#dc2626; }
    .stat-value.warn { color:#d97706; }

    /* 위반 감지 타임라인 */
    .timeline-item { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid #f1f5f9; }
    .timeline-item:last-child { border-bottom:none; }
    .timeline-img { width:80px; height:56px; border-radius:8px; object-fit:cover; flex-shrink:0; background:#e2e8f0; }
    .timeline-body { flex:1; }
    .timeline-top { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .tl-badge { font-size:11px; font-weight:700; padding:2px 8px; border-radius:12px; }
    .tl-badge.위험 { background:#fee2e2; color:#dc2626; }
    .tl-badge.주의 { background:#fef3c7; color:#d97706; }
    .tl-badge.정상 { background:#dcfce7; color:#16a34a; }
    .tl-desc { font-size:13px; color:#475569; }
    .tl-time { font-size:11px; color:#94a3b8; margin-top:3px; }

    /* 권고사항 */
    .rec-item { display:flex; gap:10px; align-items:flex-start; padding:10px 0; border-bottom:1px solid #f1f5f9; }
    .rec-item:last-child { border-bottom:none; }
    .rec-dot { width:8px; height:8px; background:#f59e0b; border-radius:50%; flex-shrink:0; margin-top:5px; }
    .rec-text { font-size:13px; color:#334155; line-height:1.6; }

    /* 종합평가 */
    .eval-text { font-size:14px; color:#475569; line-height:1.8; margin-bottom:16px; }
    .law-box { background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:14px; }
    .law-title { font-size:12px; color:#94a3b8; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
    .law-content { font-size:13px; color:#334155; line-height:1.7; }

    /* 하단 문구 */
    .bottom-msg { background:#1e293b; border-radius:16px; padding:20px; text-align:center; color:#fff; font-size:14px; font-style:italic; margin-top:8px; }

    .loading { text-align:center; padding:60px; color:#94a3b8; }
    .error { text-align:center; padding:60px; color:#ef4444; }
  </style>
</head>
<body>
<div class="report-wrap">
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()"><i class="ri-arrow-left-line"></i> 목록으로</button>
    <span class="report-title" id="pageTitle">AI 안전 분석 보고서</span>
  </div>

  <div id="loadingState" class="loading">보고서를 불러오는 중...</div>
  <div id="errorState" class="error" style="display:none"></div>
  <div id="content" style="display:none">

    <!-- 대표 이미지 -->
    <div class="main-image" id="mainImageWrap">
      <div class="no-image"><i class="ri-image-line" style="font-size:32px;display:block;margin-bottom:8px;"></i>대표 스냅샷</div>
    </div>

    <!-- 1. 위험도 평가 -->
    <div class="card" id="riskCard">
      <div class="card-title"><span class="card-num">1</span> AI 사고예측 및 등급 평가</div>
      <div class="risk-big" id="riskBig">
        <div class="risk-circle">
          <span class="risk-score" id="riskScore">-</span>
          <span class="risk-pct">%</span>
        </div>
        <div class="risk-info">
          <h3>예측된 위험도: <span id="riskScoreText">-</span>%</h3>
          <p>현재 등급: <span id="riskGradeText">-</span></p>
          <span class="risk-badge" id="riskBadge">-</span>
        </div>
      </div>
      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-label">감지된 작업자</div>
          <div class="stat-value" id="totalWorkers">-</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">분석 프레임</div>
          <div class="stat-value" id="totalFrames">-</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">안전모 미착용</div>
          <div class="stat-value danger" id="helmetVio">-</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">안전조끼 미착용</div>
          <div class="stat-value warn" id="vestVio">-</div>
        </div>
      </div>
    </div>

    <!-- 2. 위반 감지 타임라인 -->
    <div class="card">
      <div class="card-title"><span class="card-num">2</span> AI 위반 감지 타임라인</div>
      <div id="timelineList"><p style="color:#94a3b8;font-size:14px;text-align:center;padding:20px 0;">감지 항목 없음</p></div>
    </div>

    <!-- 3. 권고 및 대응 조치사항 -->
    <div class="card">
      <div class="card-title"><span class="card-num">3</span> 권고 및 대응 조치사항</div>
      <div id="recList"></div>
    </div>

    <!-- 4. 종합평가 -->
    <div class="card">
      <div class="card-title"><span class="card-num">4</span> 종합평가</div>
      <p class="eval-text" id="summaryEval">-</p>
      <div class="law-box">
        <div class="law-title"><i class="ri-scales-3-line"></i> 산업안전보건법 위반 법규 요약</div>
        <div class="law-content" id="lawRef">-</div>
      </div>
    </div>

    <div class="bottom-msg">"위험은 단일 요소보다 복합 구조에서 시작됩니다. AI는 감지하고, 현장은 예방합니다."</div>
  </div>
</div>

<script>
  const BASE_URL = 'https://safety-server-oqza.onrender.com';
  const reportId = location.pathname.split('/').pop();

  function formatDate(str) {
    if (!str) return '-';
    return new Date(str).toLocaleString('ko-KR');
  }

  async function load() {
    try {
      const res = await fetch(BASE_URL + '/api/reports/' + reportId);
      if (!res.ok) throw new Error('서버 오류 ' + res.status);
      const data = await res.json();
      const r = data.report;
      const items = data.items || [];

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.getElementById('pageTitle').textContent = '보고서 #' + r.report_id;

      // 위험도 등급 설정
      const grade = r.risk_grade || '정상';
      const score = r.risk_score || 0;
      document.getElementById('riskCard').className = 'card grade-' + grade;
      document.getElementById('riskScore').textContent = score;
      document.getElementById('riskScoreText').textContent = score;
      document.getElementById('riskGradeText').textContent = grade;
      document.getElementById('riskBadge').textContent = grade + ' 등급';
      document.getElementById('totalWorkers').textContent = (r.total_workers || 0) + '명';
      document.getElementById('totalFrames').textContent = items.length + '개';
      document.getElementById('helmetVio').textContent = (r.helmet_violations || 0) + '건';
      document.getElementById('vestVio').textContent = (r.vest_violations || 0) + '건';

      // 대표 이미지 (첫 번째 위험/주의 프레임)
      const violationItem = items.find(i => (i.status === '위험' || i.status === '주의') && i.frame_path && i.frame_path.startsWith('http'));
      if (violationItem) {
        document.getElementById('mainImageWrap').innerHTML = '<img src="' + violationItem.frame_path + '" alt="대표 스냅샷"/>';
      }

      // 타임라인 (위험/주의만 최대 5개)
      const violations = items.filter(i => i.status === '위험' || i.status === '주의').slice(0, 5);
      if (violations.length > 0) {
        document.getElementById('timelineList').innerHTML = violations.map(item => {
          const imgHtml = (item.frame_path && item.frame_path.startsWith('http'))
            ? '<img class="timeline-img" src="' + item.frame_path + '" alt="프레임"/>'
            : '<div class="timeline-img" style="display:flex;align-items:center;justify-content:center;"><i class="ri-image-line" style="color:#cbd5e1"></i></div>';
          return '<div class="timeline-item">'
            + imgHtml
            + '<div class="timeline-body">'
            + '<div class="timeline-top"><span class="tl-badge ' + item.status + '">' + item.status + '</span></div>'
            + '<div class="tl-desc">' + (item.description || '') + '</div>'
            + '<div class="tl-time">' + formatDate(item.event_time) + '</div>'
            + '</div></div>';
        }).join('');
      }

      // 권고사항
      let recs = [];
      try { recs = JSON.parse(r.recommendations || '[]'); } catch(e) { recs = []; }
      if (recs.length > 0) {
        document.getElementById('recList').innerHTML = recs.map(rec =>
          '<div class="rec-item"><div class="rec-dot"></div><div class="rec-text">' + rec + '</div></div>'
        ).join('');
      } else {
        document.getElementById('recList').innerHTML = '<p style="color:#94a3b8;font-size:14px;">권고사항 없음</p>';
      }

      // 종합평가
      document.getElementById('summaryEval').textContent = r.summary_eval || '-';
      document.getElementById('lawRef').textContent = r.law_references || '해당 없음';

    } catch (err) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('errorState').textContent = '오류: ' + err.message;
    }
  }

  load();
</script>
</body>
</html>
