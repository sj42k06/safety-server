<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>보고서 상세 - 스마트 현장 안전관제 시스템</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#f1f5f9; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; }
    .wrap { max-width:860px; margin:0 auto; padding:24px 16px 80px; }

    /* 상단 바 */
    .top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .back-btn { display:flex; align-items:center; gap:6px; background:#fff; border:1px solid #e2e8f0; padding:8px 16px; border-radius:10px; cursor:pointer; font-size:13px; color:#475569; font-family:inherit; transition:all .2s; }
    .back-btn:hover { background:#f8fafc; }
    .top-actions { display:flex; gap:8px; }
    .btn-pdf { display:flex; align-items:center; gap:6px; background:#dc2626; color:#fff; border:none; padding:8px 16px; border-radius:10px; cursor:pointer; font-size:13px; font-weight:700; font-family:inherit; transition:all .2s; }
    .btn-pdf:hover { background:#b91c1c; }

    /* 카드 */
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:24px; margin-bottom:16px; }
    .card-title { display:flex; align-items:center; gap:10px; font-size:16px; font-weight:700; color:#1e293b; margin-bottom:18px; padding-bottom:12px; border-bottom:1px solid #f1f5f9; }
    .card-num { width:28px; height:28px; background:#1e293b; color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }

    /* 1. 종합 위험도 */
    .risk-top { display:flex; align-items:center; gap:28px; }
    .donut-wrap { position:relative; width:140px; height:140px; flex-shrink:0; }
    .donut-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
    .donut-pct { font-size:28px; font-weight:800; color:#1e293b; }
    .donut-label { font-size:11px; color:#94a3b8; }
    .risk-info { flex:1; }
    .risk-grade { display:inline-flex; align-items:center; gap:6px; padding:6px 16px; border-radius:20px; font-size:14px; font-weight:700; margin-bottom:10px; }
    .risk-grade.즉각조치 { background:#fee2e2; color:#dc2626; }
    .risk-grade.위험 { background:#fef3c7; color:#d97706; }
    .risk-grade.주의 { background:#dcfce7; color:#16a34a; }
    .risk-meta { font-size:13px; color:#64748b; line-height:1.8; }

    /* 2. 보고 개요 */
    .overview-table { width:100%; border-collapse:collapse; font-size:13px; }
    .overview-table td { padding:10px 14px; border-bottom:1px solid #f1f5f9; }
    .overview-table tr:last-child td { border-bottom:none; }
    .overview-table td:first-child { color:#94a3b8; font-weight:600; width:130px; }
    .overview-table td:last-child { color:#1e293b; font-weight:500; }

    /* 3. 타임라인 표 */
    .timeline-table { width:100%; border-collapse:collapse; font-size:12px; }
    .timeline-table th { background:#f8fafc; padding:10px 12px; text-align:left; font-weight:700; color:#64748b; border-bottom:2px solid #e2e8f0; white-space:nowrap; }
    .timeline-table td { padding:10px 12px; border-bottom:1px solid #f8fafc; vertical-align:middle; }
    .timeline-table tr:hover td { background:#fafafa; }
    .thumb-img { width:60px; height:44px; border-radius:6px; object-fit:cover; background:#e2e8f0; display:flex; align-items:center; justify-content:center; }
    .thumb-img img { width:100%; height:100%; object-fit:cover; border-radius:6px; }
    .thumb-none { width:60px; height:44px; border-radius:6px; background:#f1f5f9; display:flex; align-items:center; justify-content:center; color:#cbd5e1; font-size:18px; }
    .grade-badge { display:inline-block; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:700; }
    .grade-badge.즉각조치 { background:#fee2e2; color:#dc2626; }
    .grade-badge.위험 { background:#fef3c7; color:#d97706; }
    .grade-badge.주의 { background:#dcfce7; color:#16a34a; }
    .action-badge { display:inline-block; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:700; }
    .action-badge.조치완료 { background:#dcfce7; color:#16a34a; }
    .action-badge.미조치 { background:#fee2e2; color:#dc2626; }
    .action-badge.확인중 { background:#fef3c7; color:#d97706; }

    /* 4. 법적 근거 */
    .law-item { display:flex; gap:12px; padding:12px; background:#f8fafc; border-radius:10px; margin-bottom:8px; }
    .law-icon { color:#2563eb; font-size:18px; flex-shrink:0; margin-top:1px; }
    .law-name { font-size:13px; font-weight:700; color:#1e293b; margin-bottom:3px; }
    .law-content { font-size:12px; color:#64748b; line-height:1.6; }

    /* 5. 권고 조치사항 */
    .rec-item { display:flex; gap:10px; padding:10px; border-left:3px solid #dc2626; background:#fef2f2; border-radius:0 8px 8px 0; margin-bottom:8px; }
    .rec-case { font-size:12px; font-weight:700; color:#dc2626; min-width:100px; }
    .rec-text { font-size:12px; color:#475569; line-height:1.6; }

    /* 6. 종합 평가 */
    .eval-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
    .eval-card { background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:14px; text-align:center; }
    .eval-num { font-size:28px; font-weight:800; color:#1e293b; }
    .eval-label { font-size:11px; color:#94a3b8; margin-top:2px; }
    .eval-summary { background:#f8fafc; border-radius:10px; padding:14px; font-size:13px; color:#475569; line-height:1.8; }

    /* 7. 위험도 기준표 */
    .criteria-wrap { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:14px; }
    .criteria-formula { flex:1; min-width:200px; background:#1e293b; color:#fff; border-radius:10px; padding:14px; }
    .criteria-formula .f-label { font-size:11px; color:#94a3b8; margin-bottom:6px; }
    .criteria-formula .f-text { font-size:14px; font-weight:700; font-family:monospace; }
    .criteria-table { width:100%; border-collapse:collapse; font-size:12px; }
    .criteria-table th { background:#f8fafc; padding:8px 12px; text-align:left; font-weight:700; color:#64748b; border-bottom:1px solid #e2e8f0; }
    .criteria-table td { padding:8px 12px; border-bottom:1px solid #f8fafc; }
    .criteria-table tr:last-child td { border-bottom:none; }

    .loading { text-align:center; padding:60px; color:#94a3b8; }

    /* 사진 클릭 확대 */
    .thumb-img { cursor:pointer; transition:opacity .2s; }
    .thumb-img:hover { opacity:.8; }
    #imgModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:9999; align-items:center; justify-content:center; cursor:pointer; }
    #imgModal.show { display:flex; }
    #imgModal img { max-width:90vw; max-height:90vh; border-radius:12px; }

    /* 인수인계 섹션 */
    .handover-section { background:#fff; border:2px solid #1e293b; border-radius:16px; padding:24px; margin-bottom:16px; }
    .handover-title { font-size:16px; font-weight:800; color:#1e293b; margin-bottom:18px; padding-bottom:12px; border-bottom:1px solid #f1f5f9; display:flex; align-items:center; gap:10px; }
    .handover-input { width:100%; padding:10px 14px; border:1px solid #e2e8f0; border-radius:10px; font-size:14px; font-family:inherit; margin-top:4px; }
    .btn-handover { width:100%; padding:14px; border:none; border-radius:12px; background:linear-gradient(135deg,#1e293b,#0f172a); color:#fff; font-size:15px; font-weight:800; cursor:pointer; font-family:inherit; margin-top:16px; }
    .handover-done { display:none; margin-top:12px; padding:12px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:10px; text-align:center; font-size:13px; color:#16a34a; font-weight:700; }
    .empty-msg { text-align:center; padding:30px; color:#94a3b8; font-size:13px; }
  </style>
</head>
<body>
<div class="wrap" id="reportWrap">
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()">
      <i class="ri-arrow-left-line"></i> 목록으로
    </button>
    <div class="top-actions">
      <button class="btn-pdf" onclick="downloadPdf()">
        <i class="ri-file-pdf-line"></i> PDF 다운로드
      </button>
    </div>
  </div>

  <div id="content"><div class="loading"><i class="ri-loader-4-line" style="font-size:32px;display:block;margin-bottom:12px;"></i>보고서 불러오는 중...</div></div>
</div>

<script>
  const BASE_URL = '';
  const reportId = location.pathname.split('/').pop();

  const CASE_COLORS = {
    '출입 금지 구역 또는 낙하물 위험 구역 무단 진입 감지': '#E24B4A',
    '작업 통로 및 비상 통로 자재물 적치 감지': '#BA7517',
    '안전모, 안전조끼, 안전화 등 안전복 미착용': '#378ADD',
    '작업자 밀집 위험 감지': '#7F77DD',
    '중장비 작업 반경 내 인원 접근 감지': '#D4537E',
  };

  const LAW_MAP = {
    '출입 금지 구역 또는 낙하물 위험 구역 무단 진입 감지': { name:'산업안전보건법 제42조', content:'사업주는 작업장에서 낙하물이 발생할 우려가 있는 경우 위험구역을 설정하고 출입을 통제해야 한다.' },
    '작업 통로 및 비상 통로 자재물 적치 감지': { name:'산업안전보건기준에 관한 규칙 제3조', content:'사업주는 작업 통로 및 비상 통로에 자재물을 적치하여 통행을 방해해서는 안 된다.' },
    '안전모, 안전조끼, 안전화 등 안전복 미착용': { name:'산업안전보건법 제38조', content:'사업주는 작업자가 작업환경에 적합한 보호구를 착용하도록 지시하고 관리해야 한다.' },
    '작업자 밀집 위험 감지': { name:'산업안전보건기준에 관한 규칙 제14조', content:'사업주는 작업장 내 작업자 밀집으로 인한 충돌 및 사고 위험을 방지해야 한다.' },
    '중장비 작업 반경 내 인원 접근 감지': { name:'산업안전보건기준에 관한 규칙 제200조', content:'사업주는 중장비 작업 시 작업 반경 내 작업자의 접근을 금지하고 안전거리를 확보해야 한다.' },
  };

  const REC_MAP = {
    '출입 금지 구역 또는 낙하물 위험 구역 무단 진입 감지': '작업자를 위험구역에서 즉시 이탈시키고 출입 통제 강화 및 안전 표지 점검',
    '작업 통로 및 비상 통로 자재물 적치 감지': '통로 내 적치물 즉시 제거 후 이동 경로 확보, 향후 자재 보관 구역 별도 지정',
    '안전모, 안전조끼, 안전화 등 안전복 미착용': '미착용 작업자 즉시 작업 중단 후 보호구 착용 확인, 작업 전 보호구 착용 점검 강화',
    '작업자 밀집 위험 감지': '작업자 분산 배치 및 작업 동선 조정, 밀집 구역 작업 일정 재조율',
    '중장비 작업 반경 내 인원 접근 감지': '중장비 작업 반경 내 인원 즉시 대피, 작업 중 안전 구역 표시 강화',
  };

  async function loadReport() {
    try {
      const res = await fetch(`${BASE_URL}/api/reports/${reportId}`);
      const data = await res.json();
      if (!data.success) throw new Error('보고서 없음');
      renderReport(data.report, data.timeline || []);
    } catch(e) {
      document.getElementById('content').innerHTML = '<div class="loading" style="color:#dc2626;">보고서를 불러올 수 없습니다.</div>';
    }
  }

  function getGrade(pct) {
    const p = parseFloat(pct || 0);
    if (p >= 60) return '즉각조치';
    if (p >= 31) return '위험';
    return '주의';
  }

  function renderReport(r, timeline) {
    const avgPct = parseFloat(r.avg_risk_percent || 0).toFixed(1);
    const grade = getGrade(r.max_risk_percent);
    const gradeColor = grade === '즉각조치' ? '#dc2626' : grade === '위험' ? '#d97706' : '#16a34a';

    // 감지된 케이스 목록
    const caseSet = [...new Set(timeline.map(t => t.risk_case))];
    const laws = caseSet.map(c => LAW_MAP[c]).filter(Boolean);
    const recs = caseSet.map(c => ({ case: c, rec: REC_MAP[c] })).filter(x => x.rec);

    // 종합 위험도
    const totalEvents = r.total_risk_events || 0;
    const resolved = r.resolved_count || 0;
    const unresolved = r.unresolved_count || 0;

    document.getElementById('content').innerHTML = `
      <!-- 1. 종합 위험도 -->
      <div class="card">
        <div class="card-title"><div class="card-num">1</div> 종합 위험도</div>
        <div class="risk-top">
          <div class="donut-wrap">
            <canvas id="donutChart" width="140" height="140"></canvas>
            <div class="donut-center">
              <div class="donut-pct">${avgPct}%</div>
              <div class="donut-label">평균 위험도</div>
            </div>
          </div>
          <div class="risk-info">
            <div class="risk-grade ${grade}">
              <i class="ri-shield-flash-line"></i> ${grade} 등급
            </div>
            <div class="risk-meta">
              총 감지 건수: <strong>${totalEvents}건</strong><br>
              최고 위험도: <strong>${parseFloat(r.max_risk_percent||0).toFixed(1)}%</strong><br>
              근거: 고용노동부 고시 제2024-76호 사업장 위험성평가에 관한 지침
            </div>
          </div>
        </div>
      </div>

      <!-- 2. 보고 개요 -->
      <div class="card">
        <div class="card-title"><div class="card-num">2</div> 보고 개요</div>
        <table class="overview-table">
          <tr><td>보고서 제목</td><td>${r.report_title || '-'}</td></tr>
          <tr><td>보고 일자</td><td>${r.report_date ? r.report_date.slice(0,10) : '-'}</td></tr>
          <tr><td>근무 세션</td><td>${r.shift_type || '-'} (${r.start_time ? new Date(r.start_time).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) : '-'} ~ ${r.end_time ? new Date(r.end_time).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) : '-'})</td></tr>
          <tr><td>담당자</td><td>${r.created_by_name || '-'}</td></tr>
          <tr><td>분석 방식</td><td>YOLO AI 기반 실시간 영상 분석</td></tr>
          <tr><td>주요 사고유형</td><td>${r.major_risk_case || '-'}</td></tr>
        </table>
      </div>

      <!-- 3. 타임라인 표 -->
      <div class="card">
        <div class="card-title"><div class="card-num">3</div> 위험 감지 타임라인</div>
        ${timeline.length === 0 ? '<div class="empty-msg">감지된 위험 이벤트가 없습니다.</div>' : `
        <div style="overflow-x:auto;">
          <table class="timeline-table">
            <thead>
              <tr>
                <th>감지 시간</th>
                <th>위험 요소</th>
                <th>사진</th>
                <th>위험도</th>
                <th>등급</th>
                <th>조치여부</th>
                <th>조치내용</th>
              </tr>
            </thead>
            <tbody>
              ${timeline.map(t => {
                const tGrade = getGrade(t.risk_percent);
                const tTime = t.detected_time ? new Date(t.detected_time).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';
                const tAction = t.action_status || '미조치';
                const tImg = t.bbox_image_path;
                return `<tr>
                  <td style="white-space:nowrap;">${tTime}</td>
                  <td style="max-width:160px;font-size:11px;">${t.risk_case || '-'}</td>
                  <td>${tImg && !tImg.includes('dummy') ? `<img class="thumb-img" src="${tImg}" alt="감지 사진" onclick="openImgModal('${tImg}')">` : `<div class="thumb-none"><i class="ri-image-line"></i></div>`}</td>
                  <td style="font-weight:700;">${parseFloat(t.risk_percent||0).toFixed(1)}%</td>
                  <td><span class="grade-badge ${tGrade}">${tGrade}</span></td>
                  <td><span class="action-badge ${tAction}">${tAction}</span></td>
                  <td style="font-size:11px;color:#64748b;">${t.action_time ? '조치 완료' : '-'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`}
      </div>

      <!-- 4. 법적 근거 -->
      <div class="card">
        <div class="card-title"><div class="card-num">4</div> 법적 근거</div>
        ${laws.length === 0 ? '<div class="empty-msg">해당 법적 근거 없음</div>' :
          laws.map(l => `
            <div class="law-item">
              <i class="ri-scales-3-line law-icon"></i>
              <div>
                <div class="law-name">${l.name}</div>
                <div class="law-content">${l.content}</div>
              </div>
            </div>`).join('')}
      </div>

      <!-- 5. 권고 및 조치사항 -->
      <div class="card">
        <div class="card-title"><div class="card-num">5</div> 권고 및 조치사항</div>
        ${recs.length === 0 ? '<div class="empty-msg">해당 조치사항 없음</div>' :
          recs.map(x => `
            <div class="rec-item">
              <div class="rec-case">${(CASE_COLORS[x.case] ? '●' : '●')} ${x.case.length > 10 ? x.case.slice(0,15)+'...' : x.case}</div>
              <div class="rec-text">${x.rec}</div>
            </div>`).join('')}
      </div>

      <!-- 6. 종합 평가 -->
      <div class="card">
        <div class="card-title"><div class="card-num">6</div> 종합 평가</div>
        <div class="eval-grid">
          <div class="eval-card"><div class="eval-num">${totalEvents}</div><div class="eval-label">총 감지 건수</div></div>
          <div class="eval-card"><div class="eval-num" style="color:#dc2626;">${unresolved}</div><div class="eval-label">미조치 건수</div></div>
          <div class="eval-card"><div class="eval-num" style="color:#16a34a;">${resolved}</div><div class="eval-label">조치완료 건수</div></div>
          <div class="eval-card"><div class="eval-num" style="color:${gradeColor};">${avgPct}%</div><div class="eval-label">종합 위험도</div></div>
        </div>
        <div class="eval-summary">
          본 근무 세션에서 총 <strong>${totalEvents}건</strong>의 위험이 감지되었으며,
          평균 위험도는 <strong>${avgPct}%</strong>로 <strong>${grade}</strong> 등급으로 평가됩니다.
          ${unresolved > 0 ? `미조치 <strong>${unresolved}건</strong>이 남아있어 다음 관리자의 확인이 필요합니다.` : '모든 위험 이벤트에 대한 조치가 완료되었습니다.'}
        </div>
      </div>

      <!-- 7. 위험도 기준표 -->
      <div class="card">
        <div class="card-title"><div class="card-num">7</div> 위험도 기준표</div>
        <div class="criteria-wrap">
          <div class="criteria-formula">
            <div class="f-label">산출 공식</div>
            <div class="f-text">위험도 = 가능성 × 중대성 ÷ 25 × 100</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:6px;">근거: 고용노동부 고시 제2024-76호</div>
          </div>
          <div style="flex:1;min-width:200px;">
            <table class="criteria-table">
              <thead><tr><th>등급</th><th>범위</th><th>조치사항</th></tr></thead>
              <tbody>
                <tr><td><span class="grade-badge 즉각조치">즉각조치</span></td><td>60~100%</td><td>즉각 작업 중지</td></tr>
                <tr><td><span class="grade-badge 위험">위험</span></td><td>31~59%</td><td>주의 및 모니터링</td></tr>
                <tr><td><span class="grade-badge 주의">주의</span></td><td>0~30%</td><td>지속 관찰</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <table class="criteria-table" style="margin-top:8px;">
          <thead><tr><th>케이스</th><th>가능성</th><th>중대성</th><th>위험도</th><th>등급</th></tr></thead>
          <tbody>
            <tr><td>출입금지/낙하물 위험구역 진입</td><td>3점</td><td>5점</td><td>60%</td><td><span class="grade-badge 즉각조치">즉각조치</span></td></tr>
            <tr><td>중장비 작업 반경 내 인원 접근</td><td>3점</td><td>5점</td><td>60%</td><td><span class="grade-badge 즉각조치">즉각조치</span></td></tr>
            <tr><td>안전복 미착용</td><td>4점</td><td>3점</td><td>48%</td><td><span class="grade-badge 위험">위험</span></td></tr>
            <tr><td>작업 통로 자재물 적치</td><td>4점</td><td>2점</td><td>32%</td><td><span class="grade-badge 위험">위험</span></td></tr>
            <tr><td>작업자 밀집 위험</td><td>3점</td><td>2점</td><td>24%</td><td><span class="grade-badge 주의">주의</span></td></tr>
          </tbody>
        </table>
      </div>
    `;

    // 인수인계 섹션 표시 여부 결정
    checkHandoverSection(r.created_by || 0);
    const currentUser = localStorage.getItem('username') || 'admin1';
    const managerNames = { 'admin1':'손광민', 'admin2':'정재학', 'admin3':'관리자 C', 'admin4':'관리자 D' };
    const nameEl = document.getElementById('currentManagerName');
    if (nameEl) nameEl.textContent = managerNames[currentUser] || currentUser;
    // 현재 관리자 이름 업데이트
    const user = localStorage.getItem('username') || 'admin1';
    const nameMap = { 'admin1':'손광민', 'admin2':'정재학', 'admin3':'관리자 C', 'admin4':'관리자 D' };
    const nameEl = document.getElementById('currentManagerName');
    if (nameEl) nameEl.textContent = nameMap[user] || user;

    // 도넛 차트
    const ctx = document.getElementById('donutChart');
    if (ctx) {
      new Chart(ctx, {
        type: 'doughnut',
        data: {
          datasets: [{
            data: [parseFloat(avgPct), 100 - parseFloat(avgPct)],
            backgroundColor: [gradeColor, '#f1f5f9'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: false,
          cutout: '72%',
          plugins: { legend: { display: false }, tooltip: { enabled: false } }
        }
      });
    }
  }

  function downloadPdf() {
    const el = document.getElementById('reportWrap');
    const opt = {
      margin: 8,
      filename: `안전보고서_${reportId}.pdf`,
      image: { type: 'jpeg', quality: 0.95 },
      html2canvas: { scale: 2 },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(el).save();
  }

  loadReport();

  // 현재 관리자 표시
  // 현재 관리자 이름 표시
  function showCurrentManager() {
    const user = localStorage.getItem('username') || 'admin1';
    const nameMap = { 'admin1':'손광민', 'admin2':'정재학', 'admin3':'관리자 C', 'admin4':'관리자 D' };
    const el = document.getElementById('currentManagerName');
    if (el) el.textContent = nameMap[user] || user;
  }
  showCurrentManager();

  // 인수인계 섹션 - 보고서 생성자가 아닌 사람에게만 표시
  function checkHandoverSection(createdById) {
    const user = localStorage.getItem('username') || 'admin1';
    const userIdMap = { 'admin1':1, 'admin2':2, 'admin3':3, 'admin4':4 };
    const currentUserId = userIdMap[user] || 1;
    const section = document.getElementById('handoverSection');
    if (!section) return;
    // 보고서 생성자와 현재 로그인 사람이 다를 때만 표시
    if (currentUserId !== createdById) {
      section.style.display = 'block';
    } else {
      section.style.display = 'none';
    }
  }

  // 사진 확대
  function openImgModal(src) {
    document.getElementById('imgModalSrc').src = src;
    document.getElementById('imgModal').style.display = 'flex';
  }
  function closeImgModal() {
    document.getElementById('imgModal').style.display = 'none';
  }

  // 인수인계 승인
  async function approveHandover() {
    const nextManager = document.getElementById('nextManagerInput').value.trim();
    if (!nextManager) {
      alert('다음 관리자 이름을 입력해주세요.');
      return;
    }

    const btn = document.getElementById('btnHandoverApprove');
    btn.disabled = true;
    btn.textContent = '처리 중...';

    try {
      const token = localStorage.getItem('token') || '';

      // 인수인계 승인 API 호출
      await fetch(BASE_URL + '/api/handover/confirm', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          report_id: reportId,
          next_manager: nextManager
        })
      });

      btn.style.display = 'none';
      document.getElementById('handoverDone').style.display = 'block';
      document.getElementById('nextManagerInput').disabled = true;

      // 3초 후 현장 모니터링으로 이동
      setTimeout(() => {
        window.location.href = '/upload';
      }, 3000);

    } catch(e) {
      btn.disabled = false;
      btn.textContent = '✅ 인수인계 승인';
      alert('오류가 발생했습니다. 다시 시도해주세요.');
    }
  }
</script>

  <!-- 인수인계 확인 섹션 -->
  <div style="max-width:860px;margin:0 auto;padding:0 16px 80px;">
    <div class="handover-section" id="handoverSection" style="display:none;">
      <div class="handover-title">✅ 인수인계 확인</div>
      <table class="overview-table" style="margin-bottom:16px;">
        <tr>
          <td style="color:#94a3b8;font-weight:600;width:130px;">현재 관리자</td>
          <td style="font-weight:700;color:#1e293b;" id="currentManagerName">-</td>
        </tr>
        <tr>
          <td style="color:#94a3b8;font-weight:600;">다음 관리자</td>
          <td>
            <input type="text" id="nextManagerInput" class="handover-input" placeholder="다음 관리자 이름 입력" />
          </td>
        </tr>
      </table>
      <button class="btn-handover" id="btnHandoverApprove" onclick="approveHandover()">
        ✅ 인수인계 승인
      </button>
      <div class="handover-done" id="handoverDone">
        인수인계가 확인되었습니다! 현장 모니터링으로 이동합니다...
      </div>
    </div>
  </div>

  <!-- 사진 확대 모달 -->
  <div id="imgModal" onclick="closeImgModal()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center;cursor:pointer;">
    <img id="imgModalSrc" src="" alt="감지 사진" style="max-width:90vw;max-height:90vh;border-radius:12px;" />
  </div>

</body>
</html>
