<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>산업현장 스마트 안전관리 보고서 시스템</title>
  <link rel="stylesheet" href="login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs"></script>
  <style>
    .spin { display:inline-block; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="logo">
      <div class="logo-icon"><i class="ri-shield-check-line"></i></div>
      <div class="logo-text">
        <span>스마트 현장</span>
        <span>안전관제</span>
      </div>
    </div>
    <div class="left-panel">
      <div class="clock-box">
        <div class="clock-time" id="clock-time">00:00:00</div>
        <div class="clock-date" id="clock-date"></div>
      </div>
      <div class="lottie-wrap">
        <dotlottie-player
          src="https://lottie.host/35709285-a7ce-4841-9789-ac4fabe2cb91/0WNUiQc08G.lottie"
          background="transparent" speed="1" loop autoplay>
        </dotlottie-player>
      </div>
      <div class="badges">
        <div class="badge"><span class="dot green"></span>CCTV 모니터링</div>
        <div class="badge"><span class="dot red"></span>위험 감지</div>
      </div>
    </div>

    <div class="right-panel">
      <div class="login-card">
        <div class="login-header">
          <h1>산업현장 스마트<br />안전관리 보고서 시스템</h1>
          <p>관리자 로그인</p>
        </div>
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>아이디 (ID)</label>
            <div class="input-wrap">
              <i class="ri-user-line input-icon"></i>
              <input type="text" id="userId" placeholder="아이디를 입력하세요" />
            </div>
          </div>
          <div class="form-group">
            <label>비밀번호 (Password)</label>
            <div class="input-wrap">
              <i class="ri-lock-line input-icon"></i>
              <input type="password" id="password" placeholder="비밀번호를 입력하세요" />
            </div>
          </div>
          <div class="save-id-row">
            <div class="checkbox" id="saveIdBox" onclick="toggleSaveId()"></div>
            <span onclick="toggleSaveId()">아이디 저장</span>
          </div>
          <div class="error-box" id="errorBox" style="display:none;">
            <i class="ri-error-warning-line"></i>
            <span id="errorMsg"></span>
          </div>
          <button type="submit" id="loginBtn" class="login-btn">LOG IN</button>
          <div style="margin-top:16px; padding:10px 16px; border-radius:8px; background:#f8fafc; border:1px dashed #cbd5e1; font-size:12px; color:#64748b;">
            <span style="font-weight:600; color:#475569;">계정:</span>
            admin / 1234 &nbsp;·&nbsp; admin2 / 1234
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const ACCOUNTS = {
      'admin':  { pwd: '1234', name: '관리자 (admin)'  },
      'admin2': { pwd: '1234', name: '관리자2 (admin2)' },
    };
    let saveId = false;

    window.onload = () => {
      const saved = localStorage.getItem("savedUserId");
      if (saved) {
        document.getElementById("userId").value = saved;
        saveId = true;
        document.getElementById("saveIdBox").classList.add("checked");
      }
      updateClock();
      setInterval(updateClock, 1000);
    };

    function updateClock() {
      const now = new Date();
      document.getElementById("clock-time").textContent =
        now.toLocaleTimeString("ko-KR", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
      document.getElementById("clock-date").textContent =
        now.toLocaleDateString("ko-KR", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
    }

    function toggleSaveId() {
      saveId = !saveId;
      document.getElementById("saveIdBox").classList.toggle("checked", saveId);
    }

    function showError(msg) {
      document.getElementById("errorMsg").textContent = msg;
      document.getElementById("errorBox").style.display = "flex";
    }
    function hideError() {
      document.getElementById("errorBox").style.display = "none";
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError();
      const userId   = document.getElementById("userId").value.trim();
      const password = document.getElementById("password").value;
      if (!userId || !password) { showError("아이디와 비밀번호를 입력해주세요."); return; }

      const btn = document.getElementById("loginBtn");
      btn.disabled = true;
      btn.innerHTML = '<i class="ri-loader-4-line spin"></i> 로그인 중...';

      if (saveId) localStorage.setItem("savedUserId", userId);
      else        localStorage.removeItem("savedUserId");

      await new Promise(r => setTimeout(r, 500));

      const account = ACCOUNTS[userId];
      if (account && account.pwd === password) {
        // 로그인 정보 저장 후 인수인계 페이지로 이동
        localStorage.setItem('username', userId);
        localStorage.setItem('username_display', account.name);
        localStorage.removeItem('handover_done');

        // 미확인 보고서 있는지 체크
        const checkRes = await fetch('/api/handover/pending', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const checkData = await checkRes.json();

        if (checkData.hasPending) {
          // 미확인 보고서 있으면 팝업 표시
          localStorage.setItem('pendingReportId', checkData.report_id);
          localStorage.setItem('pendingReportTitle', checkData.report_title);
          localStorage.setItem('pendingFromUser', checkData.from_user);
          showPendingPopup(checkData);
        } else {
          window.location.href = '/upload';
        }
      } else {
        showError("아이디 또는 비밀번호가 올바르지 않습니다.");
        btn.disabled = false;
        btn.innerHTML = "LOG IN";
      }
    }
  </script>
  <!-- 미확인 보고서 팝업 -->
  <div id="pendingPopup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:20px;padding:32px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3);">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:48px;margin-bottom:8px;">📋</div>
        <div style="font-size:20px;font-weight:800;color:#1e293b;margin-bottom:6px;">미확인 보고서가 있습니다</div>
        <div style="font-size:13px;color:#64748b;">이전 관리자의 인수인계 보고서를 확인해주세요</div>
      </div>
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:20px;">
        <div style="font-size:12px;color:#94a3b8;margin-bottom:4px;">보고서</div>
        <div style="font-size:14px;font-weight:700;color:#1e293b;" id="popupReportTitle">-</div>
        <div style="font-size:12px;color:#64748b;margin-top:4px;">작성자: <span id="popupFromUser">-</span></div>
      </div>
      <button onclick="goToReport()" style="width:100%;padding:14px;background:linear-gradient(135deg,#1e293b,#0f172a);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;">
        보고서 확인하기 →
      </button>
    </div>
  </div>

  <script>
    function showPendingPopup(data) {
      document.getElementById('popupReportTitle').textContent = data.report_title || '-';
      document.getElementById('popupFromUser').textContent = data.from_user || '-';
      document.getElementById('pendingPopup').style.display = 'flex';
    }

    function goToReport() {
      const reportId = localStorage.getItem('pendingReportId');
      window.location.href = '/reports/' + reportId;
    }
  </script>

</body>
</html>
