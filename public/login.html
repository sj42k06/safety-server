<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스마트 현장 안전관제 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link href="/login.css" rel="stylesheet">
</head>
<body>
<div class="left-panel">
  <div class="logo">
    <div class="logo-icon"><i class="ri-shield-check-line"></i></div>
    <div class="logo-text">스마트 현장<br>안전관제</div>
  </div>
  <div class="time-display">
    <div class="time" id="clock">00:00:00</div>
    <div class="date" id="dateDisplay"></div>
  </div>
  <div class="hero-image">
    <img src="https://readdy.ai/api/search-image?query=isometric construction site safety monitoring system with cranes workers equipment CCTV cameras aerial view colorful flat design illustration light blue background&width=800&height=500&seq=login-hero-01&orientation=landscape" alt="현장 안전 관제 시스템" />
  </div>
  <div class="badges">
    <div class="badge"><div class="badge-dot" style="background:#22c55e"></div>실시간 모니터링</div>
    <div class="badge"><div class="badge-dot" style="background:#f59e0b"></div>AI 위험 감지</div>
    <div class="badge"><div class="badge-dot" style="background:#38bdf8"></div>CCTV 통합 관리</div>
  </div>
</div>
<div class="right-panel">
  <div class="login-card">
    <p class="subtitle">Smart Safety System</p>
    <h1>스마트 현장<br>안전관제 시스템</h1>
    <p class="desc">현장 관리자 전용 로그인</p>
    <form id="loginForm" action="/login" method="post">
      <div class="form-group">
        <label>아이디 (ID)</label>
        <div class="input-wrap">
          <i class="ri-user-line"></i>
          <input type="text" name="userid" id="userid" placeholder="아이디를 입력하세요" />
        </div>
      </div>
      <div class="form-group">
        <label>비밀번호 (Password)</label>
        <div class="input-wrap">
          <i class="ri-lock-line"></i>
          <input type="password" name="pwd" id="pwd" placeholder="비밀번호를 입력하세요" />
        </div>
      </div>
      <div class="save-id" onclick="toggleSaveId()">
        <div class="checkbox-custom" id="checkbox"><i class="ri-check-line"></i></div>
        <span>아이디 저장</span>
      </div>
      <div class="error-msg" id="errorMsg">
        <i class="ri-error-warning-line"></i>
        <span id="errorText">아이디와 비밀번호를 입력해주세요.</span>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">LOG IN</button>
    </form>
    <div class="demo-hint">
      데모 계정: <code>admin</code> / <code>1234</code>
    </div>
    <p class="footer-text">© 2026 스마트 현장 안전관제 시스템. All rights reserved.</p>
  </div>
</div>
<script>
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('dateDisplay').textContent = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
  }
  updateClock();
  setInterval(updateClock, 1000);
  let saveId = false;
  function toggleSaveId() {
    saveId = !saveId;
    document.getElementById('checkbox').classList.toggle('checked', saveId);
  }
  const savedId = localStorage.getItem('savedUserId');
  if (savedId) {
    document.getElementById('userid').value = savedId;
    saveId = true;
    document.getElementById('checkbox').classList.add('checked');
  }
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    const userid = document.getElementById('userid').value.trim();
    const pwd = document.getElementById('pwd').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('loginBtn');
    if (!userid || !pwd) {
      e.preventDefault();
      errorMsg.classList.add('show');
      return;
    }
    if (saveId) localStorage.setItem('savedUserId', userid);
    else localStorage.removeItem('savedUserId');
    btn.disabled = true;
    btn.innerHTML = '로그인 중...';
  });
</script>
</body>
</html>
