<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>산업현장 스마트 안전관리 보고서 시스템</title>
  <link rel="stylesheet" href="login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs"></script>
</head>
<body>
  <div class="login-wrapper">
    <div class="logo">
      <div class="logo-icon"><i class="ri-shield-check-line"></i></div>
      <div class="logo-text">
        <span>스마트 현장</span>
        <span>안전관제</span>
      </div>
    </div>

    <div class="left-panel">
      <div class="clock-box">
        <div class="clock-time" id="clock-time">00:00:00</div>
        <div class="clock-date" id="clock-date"></div>
      </div>
      <div class="lottie-wrap">
        <dotlottie-player
          src="https://lottie.host/35709285-a7ce-4841-9789-ac4fabe2cb91/0WNUiQc08G.lottie"
          background="transparent"
          speed="1"
          loop
          autoplay>
        </dotlottie-player>
      </div>
      <div class="badges">
        <div class="badge"><span class="dot green"></span>CCTV 모니터링</div>
        <div class="badge"><span class="dot red"></span>위험 감지</div>
      </div>
    </div>

    <div class="right-panel">
      <div class="login-card">
        <div class="login-header">
          <h1>산업현장 스마트<br />안전관리 보고서 시스템</h1>
          <p>관리자 로그인</p>
        </div>
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>아이디 (ID)</label>
            <div class="input-wrap">
              <i class="ri-user-line input-icon"></i>
              <input type="text" id="userId" placeholder="아이디를 입력하세요" />
            </div>
          </div>
          <div class="form-group">
            <label>비밀번호 (Password)</label>
            <div class="input-wrap">
              <i class="ri-lock-line input-icon"></i>
              <input type="password" id="password" placeholder="비밀번호를 입력하세요" />
            </div>
          </div>
          <div class="save-id-row">
            <div class="checkbox" id="saveIdBox" onclick="toggleSaveId()"></div>
            <span onclick="toggleSaveId()">아이디 저장</span>
          </div>
          <div class="error-box" id="errorBox" style="display:none;">
            <i class="ri-error-warning-line"></i>
            <span id="errorMsg"></span>
          </div>
          <button type="submit" id="loginBtn" class="login-btn">LOG IN</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    let saveId = false;
    window.onload = () => {
      const saved = localStorage.getItem("savedUserId");
      if (saved) {
        document.getElementById("userId").value = saved;
        saveId = true;
        document.getElementById("saveIdBox").classList.add("checked");
      }
      updateClock();
      setInterval(updateClock, 1000);
    };
    function updateClock() {
      const now = new Date();
      document.getElementById("clock-time").textContent =
        now.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      document.getElementById("clock-date").textContent =
        now.toLocaleDateString("ko-KR", { year: "numeric", month: "long", day: "numeric", weekday: "long" });
    }
    function toggleSaveId() {
      saveId = !saveId;
      document.getElementById("saveIdBox").classList.toggle("checked", saveId);
    }
    function showError(msg) {
      const box = document.getElementById("errorBox");
      document.getElementById("errorMsg").textContent = msg;
      box.style.display = "flex";
    }
    function hideError() {
      document.getElementById("errorBox").style.display = "none";
    }
    async function handleLogin(e) {
      e.preventDefault();
      hideError();
      const userId = document.getElementById("userId").value.trim();
      const password = document.getElementById("password").value;
      if (!userId || !password) {
        showError("아이디와 비밀번호를 입력해주세요.");
        return;
      }
      const btn = document.getElementById("loginBtn");
      btn.disabled = true;
      btn.innerHTML = '<i class="ri-loader-4-line spin"></i> 로그인 중...';
      if (saveId) {
        localStorage.setItem("savedUserId", userId);
      } else {
        localStorage.removeItem("savedUserId");
      }
      await new Promise(r => setTimeout(r, 600));
      if (userId === "admin" && password === "1234") {
        window.location.href = '/upload';
      } else {
        showError("아이디 또는 비밀번호가 올바르지 않습니다.");
        btn.disabled = false;
        btn.innerHTML = "LOGIN";
      }
    }
  </script>
</body>
</html>
